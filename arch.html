<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIアーキテクチャ 全体地図（簡易版） ─ 6層＋4横断面</title>
<style>
:root{--ink:#eef4fb;--sub:#a8bccf;--line:#2e4258;}
*{box-sizing:border-box} html,body{margin:0;height:100%;overflow:hidden;background:#070f1e;
  font-family:"Segoe UI","Hiragino Kaku Gothic ProN","Yu Gothic UI",Meiryo,sans-serif;color:var(--ink)}
#app{position:fixed;inset:0}
.lbl{font-size:13px;font-weight:700;padding:3px 9px;border-radius:8px;white-space:nowrap;
  background:rgba(7,14,26,.66);border:1px solid var(--line);box-shadow:0 3px 12px rgba(0,0,0,.5);pointer-events:none;backdrop-filter:blur(2px)}
.lbl.cross{color:#cfe6ff;border-color:#5a6fa0}
#tip{position:fixed;z-index:8;display:none;max-width:320px;color:#eef4fb;font-size:1.05rem;line-height:1.5;
  background:rgba(7,14,26,.94);border:1px solid #3a5575;border-radius:10px;padding:10px 13px;box-shadow:0 6px 22px rgba(0,0,0,.6);pointer-events:none;backdrop-filter:blur(2px)}
#tip b{display:block;margin-bottom:3px;font-size:1.1rem}
#title{position:fixed;left:16px;top:12px;z-index:5;text-shadow:0 2px 8px rgba(0,0,0,.7);max-width:64%}
#title h1{font-size:1.15rem;margin:0 0 4px} #title .desc{margin:0;color:var(--sub);font-size:.84rem;line-height:1.5}
#title .ops{margin:4px 0 0;color:var(--sub);font-size:.8rem}
footer{position:fixed;left:16px;bottom:10px;z-index:5;color:var(--sub);font-size:.74rem;text-shadow:0 1px 4px rgba(0,0,0,.85)}
#loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;color:#8fb4d6;z-index:9}
@media(max-width:600px){
  #title{max-width:84%} #title h1{font-size:1.05rem} #title .desc{display:none} #title .ops{font-size:.72rem}
  .lbl{font-size:11px} #tip{font-size:.95rem;max-width:78vw}
  footer{font-size:.64rem}
}
</style>
</head>
<body>
<div id="app"></div>
<div id="loading">地図を描いています･･･</div>
<div id="title">
  <h1>AIアーキテクチャ 全体地図（簡易版）</h1>
  <p class="desc">6つの層（下＝土台 → 上＝窓口）と、それを貫く4つの横断面。全体を俯瞰するための地図です。細かい中身は、各項目をAIに伴走してもらって学べばOK。</p>
  <p class="ops">各層・横断面にマウスを乗せる（スマホはタップ）と概要。ドラッグで回転／ホイール・2本指で拡大。</p>
</div>
<div id="tip"></div>
<footer>制作：AI内製化工房 MITA ｜ 公式チャンネル：https://note.com/ai_naiseika ｜ 俯瞰用の簡易版</footer>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

const app=document.getElementById('app');
const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x070f1e,0.016);
const camera=new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.1, 200);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight); renderer.setPixelRatio(Math.min(devicePixelRatio,1.75));
renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=1.15;
app.appendChild(renderer.domElement);
const pmrem=new THREE.PMREMGenerator(renderer);
scene.environment=pmrem.fromScene(new RoomEnvironment(),0.04).texture;
const labelRenderer=new CSS2DRenderer(); labelRenderer.setSize(innerWidth,innerHeight);
labelRenderer.domElement.style.position='fixed'; labelRenderer.domElement.style.top='0'; labelRenderer.domElement.style.pointerEvents='none';
app.appendChild(labelRenderer.domElement);
const controls=new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true; controls.autoRotate=true; controls.autoRotateSpeed=0.5; controls.minDistance=8; controls.maxDistance=46;

scene.add(new THREE.HemisphereLight(0xbfe0ff,0x12203a,1.0));
const key=new THREE.DirectionalLight(0xffffff,0.8); key.position.set(9,18,12); scene.add(key);
const rim=new THREE.DirectionalLight(0x7fb0ff,0.5); rim.position.set(-12,6,-10); scene.add(rim);

// 背景グラデ
const sky=new THREE.Mesh(new THREE.SphereGeometry(140,18,10), new THREE.ShaderMaterial({side:THREE.BackSide,
  uniforms:{top:{value:new THREE.Color(0x070f1e)},bot:{value:new THREE.Color(0x183356)}},
  vertexShader:'varying float h;void main(){h=normalize(position).y;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}',
  fragmentShader:'varying float h;uniform vec3 top;uniform vec3 bot;void main(){gl_FragColor=vec4(mix(bot,top,smoothstep(-0.4,0.7,h)),1.0);}'}));
scene.add(sky);

// 漂う粒子（リッチさ）
const pc=520, pg=new THREE.BufferGeometry(), pa=new Float32Array(pc*3);
for(let i=0;i<pc;i++){ const a=Math.random()*6.28, r=6+Math.random()*30; pa[i*3]=Math.cos(a)*r; pa[i*3+1]=-2+Math.random()*18; pa[i*3+2]=Math.sin(a)*r; }
pg.setAttribute('position',new THREE.BufferAttribute(pa,3));
const particles=new THREE.Points(pg,new THREE.PointsMaterial({color:0x9fd0ff,size:0.07,transparent:true,opacity:.5,depthWrite:false}));
scene.add(particles);

function glowTex(stops){ const c=document.createElement('canvas'); c.width=c.height=128; const g=c.getContext('2d');
  const gr=g.createRadialGradient(64,64,0,64,64,64); stops.forEach(s=>gr.addColorStop(s[0],s[1])); g.fillStyle=gr; g.fillRect(0,0,128,128); return new THREE.CanvasTexture(c); }
function glowSprite(color){ const t=glowTex([[0,'rgba(255,255,255,0.55)'],[0.4,color.replace('1)','0.4)')],[1,color.replace('1)','0)')]]);
  return new THREE.Sprite(new THREE.SpriteMaterial({map:t,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true})); }
function label(text,cls,x,y,z){ const d=document.createElement('div'); d.className='lbl '+(cls||''); d.textContent=text;
  const o=new CSS2DObject(d); o.position.set(x,y,z); scene.add(o); return o; }

const LAYERS=[
 {n:'① インフラ層（土台）', c:0x5a86d6, d:'どこで動かすか。クラウドか社内か。ここの選択が、上の全層に波及する“土台”。'},
 {n:'② データ層（素材）', c:0x36c8d8, d:'AIの賢さは「食わせるデータ」で決まる。何を・どう持ち、どう渡すか。'},
 {n:'③ 統合・連携層（つなぐ）', c:0x33d49a, d:'ゼロから作るより、既にある道具（表計算・会計・在庫）と繋ぐのが中小の主戦場。'},
 {n:'④ AIエンジン層（頭脳）', c:0x86d63c, d:'そもそもAIを使うか。使うならどれを・どこで。賢さ・コスト・機密のトレードオフが最も濃い。'},
 {n:'⑤ アプリ層（仕事）', c:0xf0b82e, d:'AIにどんな“仕事の形”をさせるか。欲張ると複雑、絞ると続く。'},
 {n:'⑥ インターフェース層（窓口）', c:0xf0792e, d:'人がどこで触れるか。中身が良くても、ここが使いにくいと使われない。'},
];
const W=7, D=5, H=1.15, GAP=0.75, N=LAYERS.length;
const hoverable=[];

// 台座（反射する床）
const base=new THREE.Mesh(new THREE.CylinderGeometry(6.2,6.6,0.5,48), new THREE.MeshStandardMaterial({color:0x10203a,metalness:.8,roughness:.25}));
base.position.y=-H/2-0.5; scene.add(base);

LAYERS.forEach((L,i)=>{
  const y=i*(H+GAP);
  const mat=new THREE.MeshStandardMaterial({color:L.c,metalness:.35,roughness:.18,transparent:true,opacity:.62,emissive:L.c,emissiveIntensity:.28});
  const slab=new THREE.Mesh(new THREE.BoxGeometry(W,H,D),mat); slab.position.y=y; scene.add(slab);
  const edge=new THREE.LineSegments(new THREE.EdgesGeometry(slab.geometry), new THREE.LineBasicMaterial({color:0xffffff,transparent:true,opacity:.3}));
  edge.position.y=y; scene.add(edge);
  const gs=glowSprite('rgba('+[(L.c>>16)&255,(L.c>>8)&255,L.c&255].join(',')+',1)'); gs.position.set(0,y,0); gs.scale.set(W*1.5,H*3,1); scene.add(gs);
  label(L.n,'',W/2+0.55,y,0);
  slab.userData={name:L.n,desc:L.d}; hoverable.push({mesh:slab,mat,baseEI:.28});
});

// 4横断面＝全層を貫く柱
const baseY=-H/2, topY=(N-1)*(H+GAP)+H/2, totalH=topY-baseY;
const CROSS=[
 {n:'🛡 セキュリティ', c:0xff6b8a, sx:-1, sz:-1, d:'1つの層でなく“全層を貫く守り”。完璧は無く、社内でトレードオフして有限化する。'},
 {n:'運用', c:0x8a9bff, sx:1, sz:-1, d:'作って終わりでなく、動かし続け育てる。弱いと「動いたのに続かない」。'},
 {n:'⚖ ガバナンス', c:0xc0a0ff, sx:-1, sz:1, d:'やっていい/いけないの線引きと責任。まずはA4一枚のAI利用ルールから。'},
 {n:'コスト', c:0xffd166, sx:1, sz:1, d:'結局いくらか。見える料金＋隠れコストの総額（TCO）で判断。経営者の第一関心。'},
];
// 横並びに立てた“板”で表現（全層に効く・奥もホバーしやすい）
const plateY=(baseY+topY)/2, plateH=totalH, platesX=[-5.4,-1.8,1.8,5.4], platesZ=D/2+2.6;
CROSS.forEach((C,i)=>{
  const px=platesX[i];
  const mat=new THREE.MeshStandardMaterial({color:C.c,metalness:.4,roughness:.18,transparent:true,opacity:.44,emissive:C.c,emissiveIntensity:.5,side:THREE.DoubleSide});
  const plate=new THREE.Mesh(new THREE.BoxGeometry(2.7,plateH,0.22),mat);
  plate.position.set(px,plateY,platesZ); scene.add(plate);
  const edge=new THREE.LineSegments(new THREE.EdgesGeometry(plate.geometry),new THREE.LineBasicMaterial({color:0xffffff,transparent:true,opacity:.28})); edge.position.copy(plate.position); scene.add(edge);
  label(C.n,'cross',px,topY+0.9,platesZ);
  plate.userData={name:C.n,desc:C.d}; hoverable.push({mesh:plate,mat,baseEI:.5});
});

const CTRY=(N-1)*(H+GAP)/2;
controls.target.set(0,CTRY,1.2);   // マップ本体（層スタック＋板）の中心を回転軸に
camera.position.set(0.5,CTRY+5,21);
if(innerWidth<600){ camera.position.set(0.5,CTRY+7,27); }

// ===== ホバー／タップで簡易解説 =====
const ray=new THREE.Raycaster(), mouse=new THREE.Vector2(); const tip=document.getElementById('tip');
function setHover(mesh){ for(const h of hoverable){ const on=h.mesh===mesh; h.mat.emissiveIntensity=on?h.baseEI+0.6:h.baseEI; h.mesh.scale.setScalar(on?1.05:1); } }
function showTip(e){ mouse.x=(e.clientX/innerWidth)*2-1; mouse.y=-(e.clientY/innerHeight)*2+1; ray.setFromCamera(mouse,camera);
  const hit=ray.intersectObjects(hoverable.map(h=>h.mesh),false);
  if(hit.length){ const h=hoverable.find(x=>x.mesh===hit[0].object); tip.innerHTML='<b>'+h.mesh.userData.name+'</b>'+h.mesh.userData.desc; tip.style.display='block';
    const pad=14,w=tip.offsetWidth,hh=tip.offsetHeight; let x=e.clientX+16,y=e.clientY+16;
    if(x+w>innerWidth-pad)x=e.clientX-w-16; if(y+hh>innerHeight-pad)y=innerHeight-hh-pad; if(x<pad)x=pad; if(y<pad)y=pad;
    tip.style.left=x+'px'; tip.style.top=y+'px'; setHover(h.mesh); controls.autoRotate=false; }
  else { tip.style.display='none'; setHover(null); } }
renderer.domElement.addEventListener('pointermove',e=>{ if(e.pointerType!=='touch') showTip(e); });
renderer.domElement.addEventListener('pointerdown',showTip);
renderer.domElement.addEventListener('pointerleave',()=>{ tip.style.display='none'; setHover(null); controls.autoRotate=true; });

addEventListener('resize',()=>{ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight); labelRenderer.setSize(innerWidth,innerHeight); });

const loadingEl=document.getElementById('loading'); if(loadingEl) loadingEl.remove();
let t=0;
(function loop(){ requestAnimationFrame(loop); t+=0.01;
  particles.rotation.y=t*0.04;
  controls.update(); renderer.render(scene,camera); labelRenderer.render(scene,camera);
})();
</script>
</body>
</html>
