<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>成功への道のり ─ 失敗の罠を避け、天空の城へ（AI内製化ロードマップ）</title>
<style>
:root{--ink:#eef4fb;--sub:#a8bccf;--cyan:#5cc2ff;--amber:#ffd166;--ok:#4fe0a6;--red:#ff7a7a;--line:#2e4258;}
*{box-sizing:border-box} html,body{margin:0;height:100%;overflow:hidden;background:#0a1626;
  font-family:"Segoe UI","Hiragino Kaku Gothic ProN","Yu Gothic UI",Meiryo,sans-serif;color:var(--ink)}
#app{position:fixed;inset:0}
.lbl{font-size:13px;font-weight:700;padding:3px 9px;border-radius:8px;white-space:nowrap;
  background:rgba(7,14,26,.78);border:1px solid var(--line);box-shadow:0 3px 12px rgba(0,0,0,.6);pointer-events:none;backdrop-filter:blur(2px)}
.lbl small{display:block;color:var(--sub);font-weight:400;font-size:11px;margin-top:1px}
.lbl.ok{color:var(--ok);border-color:#246a52} .lbl.red{color:var(--red);border-color:#803434}
.lbl.amber{color:var(--amber);border-color:#84621f} .lbl.cyan{color:var(--cyan);border-color:#2f6fa0}
#title{position:fixed;left:16px;top:12px;z-index:5;text-shadow:0 2px 8px rgba(0,0,0,.7);max-width:64%}
#title h1{font-size:1.12rem;margin:0 0 4px} #title .desc{margin:0;color:var(--sub);font-size:.83rem;line-height:1.5}
#title .ops{margin:4px 0 0;color:var(--sub);font-size:.8rem}
footer{position:fixed;left:16px;bottom:10px;z-index:5;color:var(--sub);font-size:.74rem;text-shadow:0 1px 4px rgba(0,0,0,.85)}
#loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;color:#8fb4d6;z-index:9}
@media(max-width:600px){
  #title{max-width:84%} #title h1{font-size:1.02rem} #title .desc{display:none} #title .ops{font-size:.72rem}
  .lbl{font-size:11px} .lbl small{display:none}
  footer{font-size:.64rem}
}
</style>
</head>
<body>
<div id="app"></div>
<div id="loading">道のりを描いています･･･</div>
<div id="title">
  <h1>成功への道のり ─ AI内製化ロードマップ</h1>
  <p class="desc">手前の毒沼・闇の魔の森・落とし穴・絶壁を流れるマグマ ―― 失敗の罠をよけ、起伏を登り、最後の崖を越えて “成功＝天空の城” へ。緑の関門＝越える6つの課題。</p>
  <p class="ops">ドラッグで回転／ホイール・2本指で拡大。</p>
</div>
<footer>制作：AI内製化工房 MITA ｜ 公式チャンネル：https://note.com/ai_naiseika</footer>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

const app=document.getElementById('app');
const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x16314f,0.009);
const camera=new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.1, 500);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight); renderer.setPixelRatio(Math.min(devicePixelRatio,1.75));
renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=1.25;
app.appendChild(renderer.domElement);
const labelRenderer=new CSS2DRenderer(); labelRenderer.setSize(innerWidth,innerHeight);
labelRenderer.domElement.style.position='fixed'; labelRenderer.domElement.style.top='0'; labelRenderer.domElement.style.pointerEvents='none';
app.appendChild(labelRenderer.domElement);
const controls=new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true; controls.maxPolarAngle=Math.PI*0.43; controls.minDistance=16; controls.maxDistance=120;

const sky=new THREE.Mesh(new THREE.SphereGeometry(340,24,12), new THREE.ShaderMaterial({side:THREE.BackSide,
  uniforms:{top:{value:new THREE.Color(0x0b1a30)},mid:{value:new THREE.Color(0x244c6b)},bot:{value:new THREE.Color(0x3a5570)}},
  vertexShader:'varying float h;void main(){h=normalize(position).y;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}',
  fragmentShader:'varying float h;uniform vec3 top;uniform vec3 mid;uniform vec3 bot;void main(){vec3 c=h>0.05?mix(mid,top,smoothstep(0.05,0.6,h)):mix(bot,mid,smoothstep(-0.1,0.05,h));gl_FragColor=vec4(c,1.0);}'}));
scene.add(sky);
scene.add(new THREE.HemisphereLight(0xbfe0ff,0x24402c,1.0));
const sun=new THREE.DirectionalLight(0xffe9c0,1.5); sun.position.set(-24,40,-12); scene.add(sun);

function glowTex(stops){ const c=document.createElement('canvas'); c.width=c.height=128; const g=c.getContext('2d');
  const gr=g.createRadialGradient(64,64,0,64,64,64); stops.forEach(s=>gr.addColorStop(s[0],s[1])); g.fillStyle=gr; g.fillRect(0,0,128,128); return new THREE.CanvasTexture(c); }
const goldGlow=glowTex([[0,'rgba(255,240,200,1)'],[0.3,'rgba(255,210,110,0.8)'],[1,'rgba(255,180,60,0)']]);
function glow(x,y,z,scale,tex=goldGlow){ const s=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true}));
  s.position.set(x,y,z); s.scale.set(scale,scale,1); scene.add(s); return s; }
function label(text,sub,cls,x,y,z){ const d=document.createElement('div'); d.className='lbl '+(cls||'');
  d.innerHTML=text+(sub?`<small>${sub}</small>`:''); const o=new CSS2DObject(d); o.position.set(x,y,z); scene.add(o); return o; }
function jitter(geo,a){ const p=geo.attributes.position; for(let i=0;i<p.count;i++){ if(p.getY(i)>0.1) p.setXYZ(i,p.getX(i)+(Math.random()-.5)*a,p.getY(i),p.getZ(i)+(Math.random()-.5)*a);} p.needsUpdate=true; geo.computeVertexNormals(); }

// ===== 地形：手前は低く平ら → 奥へ緩やかに登り → 最奥は高台（その先に絶壁）=====
function ramp(z){ const a=Math.max(0,Math.min(1,(6-z)/22)); return a*a*8.2; }   // z>=6で0（平ら）、z<=-16で8.2（高台）
function hAt(x,z){ const amp=z>6?0.45:0.95; return ramp(z) + Math.sin(x*0.17)*amp + Math.cos((x*0.42+z)*0.12)*amp*0.85 + Math.sin(z*0.09)*0.4; }
const GSEG=120, GSIZE=120;
const groundGeo=new THREE.PlaneGeometry(GSIZE,GSIZE,GSEG,GSEG);
{ const p=groundGeo.attributes.position; for(let i=0;i<p.count;i++){ const x=p.getX(i), y=p.getY(i); p.setZ(i, hAt(x,y)); } groundGeo.computeVertexNormals(); }
const ground=new THREE.Mesh(groundGeo, new THREE.MeshStandardMaterial({color:0x356235,roughness:1,flatShading:true}));
ground.rotation.x=-Math.PI/2; scene.add(ground);

function tree(x,z,s=1,dark=false){ const y=hAt(x,z); const g=new THREE.Group();
  const tr=new THREE.Mesh(new THREE.CylinderGeometry(0.12*s,0.18*s,1.1*s,6),new THREE.MeshStandardMaterial({color:dark?0x2a1830:0x5a4326})); tr.position.y=0.55*s; g.add(tr);
  for(let k=0;k<3;k++){ const fo=new THREE.Mesh(new THREE.ConeGeometry((0.7-k*0.18)*s,(1.2-k*0.2)*s,7),new THREE.MeshStandardMaterial({color:dark?(k%2?0x2a1140:0x1d0c30):(k%2?0x2c5e34:0x244f2b),flatShading:true,emissive:dark?0x3a1060:0x000000,emissiveIntensity:dark?.25:0})); fo.position.y=(1.2+k*0.7)*s; g.add(fo); }
  g.position.set(x,y,z); scene.add(g); }
function mountain(x,z,h){ const y=hAt(x,z); const m=new THREE.Mesh(new THREE.ConeGeometry(h*0.6,h,7,1),new THREE.MeshStandardMaterial({color:0x55684f,roughness:1,flatShading:true}));
  m.position.set(x,y+h/2,z); jitter(m.geometry,0.5); scene.add(m);
  const cap=new THREE.Mesh(new THREE.ConeGeometry(h*0.26,h*0.32,7),new THREE.MeshStandardMaterial({color:0xeef3f6,roughness:.9,flatShading:true})); cap.position.set(x,y+h-h*0.16,z); scene.add(cap); }

[[-34,-30,17],[34,-30,16],[-40,-6,13],[40,-2,13],[26,8,11],[-26,10,11]].forEach(m=>mountain(m[0],m[1],m[2]));
for(let i=0;i<150;i++){ const a=Math.random()*6.28, r=10+Math.random()*42; const x=Math.cos(a)*r, z=Math.sin(a)*r; if(z<-30) continue; tree(x,z,0.9+Math.random()*0.8); }

// ===== ゴール：絶壁の上の天空の城＋崖を流れるマグマ =====
const cliffBaseY=hAt(0,-16);                  // 高台の高さ ~8
const cliff=new THREE.Mesh(new THREE.CylinderGeometry(3.4,6.2,12,10,1),new THREE.MeshStandardMaterial({color:0x4a4250,roughness:1,flatShading:true}));
cliff.position.set(0, cliffBaseY+5, -23); jitter(cliff.geometry,0.7); scene.add(cliff);
const cTop=cliffBaseY+11;
// 崖を流れ落ちるマグマ（経営者が無関心）
const lavaMat=new THREE.MeshStandardMaterial({color:0xff5a20,emissive:0xff5a20,emissiveIntensity:1.7,roughness:.5});
const lavaStreams=[];
[-1.3,0,1.3].forEach((dx,i)=>{ const st=new THREE.Mesh(new THREE.BoxGeometry(0.9,11,0.4),lavaMat); st.position.set(dx,cliffBaseY+5,-23+4.4); st.rotation.x=-0.08; scene.add(st); lavaStreams.push(st); });
const lavaPool=new THREE.Mesh(new THREE.CircleGeometry(4.2,30),lavaMat); lavaPool.rotation.x=-Math.PI/2; lavaPool.position.set(0,cliffBaseY-0.2,-18); scene.add(lavaPool);
glow(0,cliffBaseY+5,-18,8, glowTex([[0,'rgba(255,180,80,0.9)'],[0.4,'rgba(255,90,40,0.6)'],[1,'rgba(200,40,20,0)']]));
label('マグマ：経営者が無関心','絶壁を流れ落ちる。トップが本気でないと全部溶ける','red',-5.5,cliffBaseY+5,-18);

const castle=new THREE.Group(); castle.position.set(0,cTop,-23); scene.add(castle);
const keep=new THREE.Mesh(new THREE.BoxGeometry(2.2,2.4,2.2),new THREE.MeshStandardMaterial({color:0xb9c4d2,roughness:.6})); keep.position.y=1.2; castle.add(keep);
const roof=new THREE.Mesh(new THREE.ConeGeometry(1.9,1.6,4),new THREE.MeshStandardMaterial({color:0x8a3b3b})); roof.position.y=3.2; roof.rotation.y=Math.PI/4; castle.add(roof);
[[-1.6,-1.6],[1.6,-1.6],[-1.6,1.6],[1.6,1.6]].forEach(p=>{ const tw=new THREE.Mesh(new THREE.CylinderGeometry(0.55,0.65,2.8,12),new THREE.MeshStandardMaterial({color:0xc7d1de})); tw.position.set(p[0],1.1,p[1]); castle.add(tw);
  const rf=new THREE.Mesh(new THREE.ConeGeometry(0.78,1.2,12),new THREE.MeshStandardMaterial({color:0x9b4242})); rf.position.set(p[0],3.1,p[1]); castle.add(rf); });
const crown=new THREE.Mesh(new THREE.CylinderGeometry(0.6,0.5,0.55,12),new THREE.MeshStandardMaterial({color:0xffd45a,emissive:0x8a5e12,emissiveIntensity:1.3,metalness:.95,roughness:.12})); crown.position.y=4.0; castle.add(crown);
glow(0,cTop+4,-23,7.5); label('成功（天空の城）','罠をよけ、起伏を登り、崖を越えた先','amber',0,cTop+6,-23);

// ===== 成功への道（地表を這って登る・罠をよける）=====
const WP=[
 {x:0,  z:22, n:'現在地（スタート）', s:'まだ何も始めていない自社', cls:'cyan', gate:false},
 {x:-7, z:14, n:'関門① 最初の1人', s:'ファーストペンギン（経営者ならベスト）', cls:'ok'},
 {x:6,  z:8,  n:'関門② 痛みを探す', s:'使うことを目的にせず現場のペインへ', cls:'ok'},
 {x:-5, z:2,  n:'関門③ 適材適所', s:'作る人／使う人／知らず触れる人', cls:'ok'},
 {x:7,  z:-4, n:'関門④ 情報を俯瞰', s:'全部覚えず“自社のカテゴリ”を見極める', cls:'ok'},
 {x:-3, z:-10,n:'関門⑤ 小さな成功＋風土', s:'反対派より一つの成果と改革の空気', cls:'ok'},
 {x:0,  z:-15,n:'関門⑥ 最後の壁＝土台', s:'セキュリティ／アーキテクチャを地図で越える', cls:'amber'},
];
const flat=WP.map(w=>new THREE.Vector3(w.x,0,w.z));
const curve2=new THREE.CatmullRomCurve3(flat,false,'catmullrom',0.3);
const M=260, gpts=[];
for(let i=0;i<=M;i++){ const v=curve2.getPoint(i/M); gpts.push(new THREE.Vector3(v.x, hAt(v.x,v.z)+0.3, v.z)); }
const curve=new THREE.CatmullRomCurve3(gpts,false,'catmullrom',0.5);
const road=new THREE.Mesh(new THREE.TubeGeometry(curve,360,0.42,8,false),
  new THREE.MeshStandardMaterial({color:0xe7c266,emissive:0xb8860b,emissiveIntensity:.4,metalness:.3,roughness:.5}));
scene.add(road);
const ARN=18, arrows=[]; const _up=new THREE.Vector3(0,1,0);
for(let i=0;i<ARN;i++){ const a=new THREE.Mesh(new THREE.ConeGeometry(0.28,0.85,4),new THREE.MeshStandardMaterial({color:0xfff0b0,emissive:0xffd24a,emissiveIntensity:1.1,roughness:.3})); scene.add(a); arrows.push(a); }
function animArrows(t){ for(let i=0;i<ARN;i++){ const u=((t*0.04)+i/ARN)%1; const p=curve.getPointAt(u), tan=curve.getTangentAt(u).normalize();
  arrows[i].position.copy(p).addScaledVector(_up,0.42); arrows[i].quaternion.setFromUnitVectors(_up,tan); } }
WP.forEach(w=>{ const y=hAt(w.x,w.z); const col=w.cls==='cyan'?0x5cc2ff:w.cls==='amber'?0xffd166:0x4fe0a6;
  const post=new THREE.Mesh(new THREE.CylinderGeometry(0.08,0.08,1.3,6),new THREE.MeshStandardMaterial({color:0x7a5a36})); post.position.set(w.x,y+0.65,w.z); scene.add(post);
  const orb=new THREE.Mesh(new THREE.SphereGeometry(0.26,16,16),new THREE.MeshStandardMaterial({color:col,emissive:col,emissiveIntensity:1.1})); orb.position.set(w.x,y+1.45,w.z); scene.add(orb);
  glow(w.x,y+1.45,w.z,2.3);
  if(w.gate!==false){ const pm=new THREE.MeshStandardMaterial({color:col,emissive:col,emissiveIntensity:.5,metalness:.3,roughness:.4});
    [-1.1,1.1].forEach(dx=>{ const pl=new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.12,2.6,8),pm); pl.position.set(w.x+dx,y+1.3,w.z); scene.add(pl); });
    const bar=new THREE.Mesh(new THREE.BoxGeometry(2.7,0.22,0.22),pm); bar.position.set(w.x,y+2.5,w.z); scene.add(bar); }
  label(w.n,w.s,w.cls,w.x,y+(w.gate!==false?3.2:2.0),w.z);
});

// ===== 失敗の罠（手前の平地に置く・地表に密着）=====
const swampList=[];
function bigSwamp(x,z,r,name,sub){ const y=hAt(x,z);
  const pool=new THREE.Mesh(new THREE.CircleGeometry(r,44),new THREE.MeshStandardMaterial({color:0x4a2d63,emissive:0x6a2f8a,emissiveIntensity:.55,roughness:.35,metalness:.3})); pool.rotation.x=-Math.PI/2; pool.position.set(x,y+0.1,z); scene.add(pool);
  const ring=new THREE.Mesh(new THREE.RingGeometry(r,r+0.9,44),new THREE.MeshBasicMaterial({color:0x9b59b6,transparent:true,opacity:.4,side:THREE.DoubleSide})); ring.rotation.x=-Math.PI/2; ring.position.set(x,y+0.11,z); scene.add(ring);
  const bub=[]; for(let i=0;i<14;i++){ const a=Math.random()*6.28, rr=Math.random()*r*0.85; const b=new THREE.Mesh(new THREE.SphereGeometry(0.22+Math.random()*0.2,10,10),new THREE.MeshStandardMaterial({color:0x9b59b6,emissive:0x7a2f9a,emissiveIntensity:.8,transparent:true,opacity:.85}));
    b.position.set(x+Math.cos(a)*rr,y+0.3,z+Math.sin(a)*rr); scene.add(b); bub.push({b,ph:Math.random()*6.28,by:y}); }
  swampList.push({bubbles:bub}); label(name,sub,'red',x,y+2.2,z); }
function pitfall(x,z,name,sub){ const y=hAt(x,z); const r=2.6;
  const hole=new THREE.Mesh(new THREE.CircleGeometry(r,28),new THREE.MeshBasicMaterial({color:0x05070c})); hole.rotation.x=-Math.PI/2; hole.position.set(x,y+0.05,z); scene.add(hole);
  const rim=new THREE.Mesh(new THREE.TorusGeometry(r,0.22,8,28),new THREE.MeshStandardMaterial({color:0x6a5a44,roughness:1})); rim.rotation.x=-Math.PI/2; rim.position.set(x,y+0.1,z); scene.add(rim);
  for(let k=0;k<5;k++){ const sp=new THREE.Mesh(new THREE.ConeGeometry(0.16,0.9,5),new THREE.MeshStandardMaterial({color:0xcfd6de,roughness:.6})); const a=k/5*6.28; sp.position.set(x+Math.cos(a)*r*0.5,y-0.2,z+Math.sin(a)*r*0.5); sp.rotation.x=Math.PI; scene.add(sp); } // 底の杭
  label(name,sub,'red',x,y+1.6,z); }
function darkForest(x,z,name,sub){ const y=hAt(x,z);
  for(let i=0;i<14;i++){ const a=Math.random()*6.28, rr=Math.random()*3.4; tree(x+Math.cos(a)*rr,z+Math.sin(a)*rr,1.0+Math.random()*0.7,true); }
  glow(x,y+1.5,z,6, glowTex([[0,'rgba(150,60,200,0.5)'],[0.5,'rgba(90,30,140,0.25)'],[1,'rgba(60,20,100,0)']]));
  label(name,sub,'red',x,y+3.4,z); }
bigSwamp(11,15,5.4,'毒沼：全員に丸投げ／個人に丸投げ','手前で広く沈む。使い道なく属人化');
pitfall(-11,8,'落とし穴：旗を振る人がいない','ファーストペンギン不在で踏み抜く');
darkForest(13,-1,'闇の魔の森：反対派に飲まれる','全員説得しようとして迷い込む');

// 花火
const fwTex=[glowTex([[0,'rgba(255,255,255,1)'],[0.3,'rgba(255,170,210,0.9)'],[1,'rgba(255,90,150,0)']]),
 glowTex([[0,'rgba(255,255,255,1)'],[0.3,'rgba(180,225,255,0.9)'],[1,'rgba(90,160,255,0)']]),
 glowTex([[0,'rgba(255,255,255,1)'],[0.3,'rgba(255,235,150,0.9)'],[1,'rgba(255,190,60,0)']])];
const bursts=[];
for(let b=0;b<4;b++){ const tex=fwTex[b%3]; const center=new THREE.Vector3((Math.random()-.5)*9,cTop+7+Math.random()*4,-23+(Math.random()-.5)*8); const sp=[];
  for(let i=0;i<20;i++){ const s=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:0}));
    const th=Math.random()*6.28, ph=Math.acos(2*Math.random()-1), v=2.4+Math.random()*1.2;
    const dir=new THREE.Vector3(Math.sin(ph)*Math.cos(th),Math.cos(ph)*0.8,Math.sin(ph)*Math.sin(th)).multiplyScalar(v); s.scale.set(0.5,0.5,1); scene.add(s); sp.push({s,dir}); }
  bursts.push({center,phase:b/4,sparks:sp}); }
function animFireworks(t){ for(const b of bursts){ const u=((t*0.14)+b.phase)%1; const ex=u<0.6, life=u/0.6;
  for(const sp of b.sparks){ if(!ex){ sp.s.material.opacity=0; continue; } const r=life*3.6;
    sp.s.position.set(b.center.x+sp.dir.x*r,b.center.y+sp.dir.y*r-life*life*2,b.center.z+sp.dir.z*r);
    sp.s.material.opacity=Math.max(0,1-life)*0.95; const sc=0.5+life*0.6; sp.s.scale.set(sc,sc,1); } } }

controls.target.set(0,5,-6);
camera.position.set(4,22,40);
if(innerWidth<600){ camera.position.set(4,26,50); }

addEventListener('resize',()=>{ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight); labelRenderer.setSize(innerWidth,innerHeight); });

const loadingEl=document.getElementById('loading'); if(loadingEl) loadingEl.remove();
let t=0;
(function loop(){ requestAnimationFrame(loop); t+=0.012;
  animArrows(t); animFireworks(t);
  for(const st of lavaStreams){ st.material.emissiveIntensity=1.4+Math.abs(Math.sin(t*2+st.position.x))*0.7; }
  for(const s of swampList){ for(const o of s.bubbles){ o.b.position.y=o.by+0.3+Math.abs(Math.sin(t*1.6+o.ph))*0.5; o.b.material.opacity=0.5+Math.abs(Math.sin(t*1.6+o.ph))*0.4; } }
  controls.update(); renderer.render(scene,camera); labelRenderer.render(scene,camera);
})();
</script>
</body>
</html>
