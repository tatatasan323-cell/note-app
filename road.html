<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>成功への道のり ─ 失敗の罠を避け、天空の城へ（AI内製化ロードマップ）</title>
<style>
:root{--ink:#eef4fb;--sub:#a8bccf;--cyan:#5cc2ff;--amber:#ffd166;--ok:#4fe0a6;--red:#ff7a7a;--line:#2e4258;}
*{box-sizing:border-box} html,body{margin:0;height:100%;overflow:hidden;background:#0a1626;
  font-family:"Segoe UI","Hiragino Kaku Gothic ProN","Yu Gothic UI",Meiryo,sans-serif;color:var(--ink)}
#app{position:fixed;inset:0}
.lbl{font-size:13px;font-weight:700;padding:3px 9px;border-radius:8px;white-space:nowrap;
  background:rgba(7,14,26,.78);border:1px solid var(--line);box-shadow:0 3px 12px rgba(0,0,0,.6);pointer-events:none;backdrop-filter:blur(2px)}
.lbl small{display:block;color:var(--sub);font-weight:400;font-size:11px;margin-top:1px}
.lbl.ok{color:var(--ok);border-color:#246a52} .lbl.red{color:var(--red);border-color:#803434}
.lbl.amber{color:var(--amber);border-color:#84621f} .lbl.cyan{color:var(--cyan);border-color:#2f6fa0}
#title{position:fixed;left:16px;top:12px;z-index:5;text-shadow:0 2px 8px rgba(0,0,0,.7);max-width:64%}
#title h1{font-size:1.12rem;margin:0 0 4px} #title .desc{margin:0;color:var(--sub);font-size:.83rem;line-height:1.5}
#title .ops{margin:4px 0 0;color:var(--sub);font-size:.8rem}
footer{position:fixed;left:16px;bottom:10px;z-index:5;color:var(--sub);font-size:.74rem;text-shadow:0 1px 4px rgba(0,0,0,.85)}
#loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;color:#8fb4d6;z-index:9}
@media(max-width:600px){
  #title{max-width:84%} #title h1{font-size:1.02rem} #title .desc{display:none} #title .ops{font-size:.72rem}
  .lbl{font-size:11px} .lbl small{display:none}
  footer{font-size:.64rem}
}
</style>
</head>
<body>
<div id="app"></div>
<div id="loading">道のりを描いています･･･</div>
<div id="title">
  <h1>成功への道のり ─ AI内製化ロードマップ</h1>
  <p class="desc">手前は低く、奥へ登るほど傾斜と山。毒沼・闇の魔の森・落とし穴をよけ、崖の手前を流れるマグマの川に橋を架け（関門⑥）、険しい崖を登って “成功＝天空の城” へ。緑の関門＝越える6課題。</p>
  <p class="ops">ドラッグで回転／ホイール・2本指で拡大。</p>
</div>
<footer>制作：AI内製化工房 MITA ｜ 公式チャンネル：https://note.com/ai_naiseika</footer>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

const app=document.getElementById('app');
const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x16314f,0.0085);
const camera=new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.1, 500);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight); renderer.setPixelRatio(Math.min(devicePixelRatio,1.75));
renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=1.25;
app.appendChild(renderer.domElement);
const labelRenderer=new CSS2DRenderer(); labelRenderer.setSize(innerWidth,innerHeight);
labelRenderer.domElement.style.position='fixed'; labelRenderer.domElement.style.top='0'; labelRenderer.domElement.style.pointerEvents='none';
app.appendChild(labelRenderer.domElement);
const controls=new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true; controls.maxPolarAngle=Math.PI*0.46; controls.minDistance=18; controls.maxDistance=130;

const sky=new THREE.Mesh(new THREE.SphereGeometry(360,24,12), new THREE.ShaderMaterial({side:THREE.BackSide,
  uniforms:{top:{value:new THREE.Color(0x0b1a30)},mid:{value:new THREE.Color(0x244c6b)},bot:{value:new THREE.Color(0x3a5570)}},
  vertexShader:'varying float h;void main(){h=normalize(position).y;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}',
  fragmentShader:'varying float h;uniform vec3 top;uniform vec3 mid;uniform vec3 bot;void main(){vec3 c=h>0.05?mix(mid,top,smoothstep(0.05,0.6,h)):mix(bot,mid,smoothstep(-0.1,0.05,h));gl_FragColor=vec4(c,1.0);}'}));
scene.add(sky);
scene.add(new THREE.HemisphereLight(0xbfe0ff,0x24402c,1.0));
const sun=new THREE.DirectionalLight(0xffe9c0,1.5); sun.position.set(-22,42,6); scene.add(sun);

function glowTex(stops){ const c=document.createElement('canvas'); c.width=c.height=128; const g=c.getContext('2d');
  const gr=g.createRadialGradient(64,64,0,64,64,64); stops.forEach(s=>gr.addColorStop(s[0],s[1])); g.fillStyle=gr; g.fillRect(0,0,128,128); return new THREE.CanvasTexture(c); }
const goldGlow=glowTex([[0,'rgba(255,240,200,1)'],[0.3,'rgba(255,210,110,0.8)'],[1,'rgba(255,180,60,0)']]);
function glow(x,y,z,scale,tex=goldGlow){ const s=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true}));
  s.position.set(x,y,z); s.scale.set(scale,scale,1); scene.add(s); return s; }
function label(text,sub,cls,x,y,z){ const d=document.createElement('div'); d.className='lbl '+(cls||'');
  d.innerHTML=text+(sub?`<small>${sub}</small>`:''); const o=new CSS2DObject(d); o.position.set(x,y,z); scene.add(o); return o; }
function jitter(geo,a){ const p=geo.attributes.position; for(let i=0;i<p.count;i++){ if(p.getY(i)>0.1) p.setXYZ(i,p.getX(i)+(Math.random()-.5)*a,p.getY(i),p.getZ(i)+(Math.random()-.5)*a);} p.needsUpdate=true; geo.computeVertexNormals(); }

// ===== 地形：手前低→奥高（寝かせたPlaneは world z=-localY なので hAt(x,-y) で合わせる）=====
function ramp(z){ const a=Math.max(0,Math.min(1,(20-z)/38)); return Math.pow(a,1.6)*7.0; }
function hAt(x,z){ const amp=z>10?0.3:0.85; return ramp(z) + Math.sin(x*0.15)*amp + Math.cos((x*0.4+z)*0.12)*amp*0.8; }
const GSEG=130, GSIZE=130;
const groundGeo=new THREE.PlaneGeometry(GSIZE,GSIZE,GSEG,GSEG);
{ const p=groundGeo.attributes.position; for(let i=0;i<p.count;i++){ const x=p.getX(i), y=p.getY(i); p.setZ(i, hAt(x,-y)); } groundGeo.computeVertexNormals(); }
const ground=new THREE.Mesh(groundGeo, new THREE.MeshStandardMaterial({color:0x356235,roughness:1,flatShading:true}));
ground.rotation.x=-Math.PI/2; scene.add(ground);

// ===== 地形に沿わせる汎用ジオメトリ =====
function terrainRibbon(curve2D, halfW, yoff, N=300){ const pos=[], idx=[];
  for(let i=0;i<=N;i++){ const t=i/N; const p=curve2D.getPoint(t); const tg=curve2D.getTangent(t);
    let ux=-tg.z, uz=tg.x; const l=Math.hypot(ux,uz)||1; ux/=l; uz/=l;
    for(const s of [-1,1]){ const ex=p.x+ux*halfW*s, ez=p.z+uz*halfW*s; pos.push(ex, hAt(ex,ez)+yoff, ez); } }
  for(let i=0;i<N;i++){ const a=i*2; idx.push(a,a+1,a+2, a+1,a+3,a+2); }
  const g=new THREE.BufferGeometry(); g.setAttribute('position',new THREE.Float32BufferAttribute(pos,3)); g.setIndex(idx); g.computeVertexNormals(); return g; }
function curveRibbon(curve3D, halfW, yoff, N=90){ const pos=[], idx=[];
  for(let i=0;i<=N;i++){ const t=i/N; const p=curve3D.getPoint(t); const tg=curve3D.getTangent(t);
    let ux=-tg.z, uz=tg.x; const l=Math.hypot(ux,uz)||1; ux/=l; uz/=l;
    for(const s of [-1,1]){ pos.push(p.x+ux*halfW*s, p.y+yoff, p.z+uz*halfW*s); } }
  for(let i=0;i<N;i++){ const a=i*2; idx.push(a,a+1,a+2, a+1,a+3,a+2); }
  const g=new THREE.BufferGeometry(); g.setAttribute('position',new THREE.Float32BufferAttribute(pos,3)); g.setIndex(idx); g.computeVertexNormals(); return g; }
function terrainDisc(cx,cz,r,seg,yoff){ const v=[cx,hAt(cx,cz)+yoff,cz], idx=[];
  for(let i=0;i<=seg;i++){ const a=i/seg*Math.PI*2; const x=cx+Math.cos(a)*r, z=cz+Math.sin(a)*r; v.push(x,hAt(x,z)+yoff,z); }
  for(let i=1;i<=seg;i++) idx.push(0,i,i+1);
  const g=new THREE.BufferGeometry(); g.setAttribute('position',new THREE.Float32BufferAttribute(v,3)); g.setIndex(idx); g.computeVertexNormals(); return g; }

function tree(x,z,s=1,dark=false){ const y=hAt(x,z); const g=new THREE.Group();
  const tr=new THREE.Mesh(new THREE.CylinderGeometry(0.12*s,0.18*s,1.1*s,6),new THREE.MeshStandardMaterial({color:dark?0x2a1830:0x5a4326})); tr.position.y=0.55*s; g.add(tr);
  for(let k=0;k<3;k++){ const fo=new THREE.Mesh(new THREE.ConeGeometry((0.7-k*0.18)*s,(1.2-k*0.2)*s,7),new THREE.MeshStandardMaterial({color:dark?(k%2?0x2a1140:0x1d0c30):(k%2?0x2c5e34:0x244f2b),flatShading:true,emissive:dark?0x3a1060:0x000000,emissiveIntensity:dark?.25:0})); fo.position.y=(1.2+k*0.7)*s; g.add(fo); }
  g.position.set(x,y,z); scene.add(g); }
function mountain(x,z,h){ const y=hAt(x,z); const m=new THREE.Mesh(new THREE.ConeGeometry(h*0.6,h,7,1),new THREE.MeshStandardMaterial({color:0x55684f,roughness:1,flatShading:true}));
  m.position.set(x,y+h/2,z); jitter(m.geometry,0.5); scene.add(m);
  const cap=new THREE.Mesh(new THREE.ConeGeometry(h*0.26,h*0.32,7),new THREE.MeshStandardMaterial({color:0xeef3f6,roughness:.9,flatShading:true})); cap.position.set(x,y+h-h*0.16,z); scene.add(cap); }
[[-34,-30,17],[-16,-40,22],[13,-40,22],[31,-26,17],[-40,-8,13],[40,-8,13]].forEach(m=>mountain(m[0],m[1],m[2]));
for(let i=0;i<150;i++){ const a=Math.random()*6.28, r=11+Math.random()*44; const x=Math.cos(a)*r, z=Math.sin(a)*r; if(z<-30) continue; if(z>6 && Math.abs(x)<9) continue; tree(x,z,0.9+Math.random()*0.8); }

// ===== マグマ：隣の火山から噴き出し→道を横切り→低い森を燃やす =====
const lavaGlow=glowTex([[0,'rgba(255,200,90,0.95)'],[0.35,'rgba(255,55,18,0.6)'],[1,'rgba(170,18,8,0)']]);
const flameTex=glowTex([[0,'rgba(255,238,140,0.98)'],[0.4,'rgba(255,80,18,0.78)'],[1,'rgba(190,24,8,0)']]);
const lavaMat=new THREE.MeshStandardMaterial({color:0x5e1000,emissive:0xff2600,emissiveIntensity:2.2,roughness:.35,metalness:.05,side:THREE.DoubleSide});
// 隣の火山
const volX=18, volZ=-25, volH=16, volBaseY=hAt(volX,volZ), volTopY=volBaseY+volH;
const volcano=new THREE.Mesh(new THREE.ConeGeometry(volH*0.62,volH,8,1),new THREE.MeshStandardMaterial({color:0x382a26,roughness:1,flatShading:true}));
volcano.position.set(volX,volBaseY+volH/2,volZ); jitter(volcano.geometry,0.7); scene.add(volcano);
const crater=new THREE.Mesh(new THREE.CylinderGeometry(volH*0.2,volH*0.12,0.7,12),lavaMat); crater.position.set(volX,volTopY-0.25,volZ); scene.add(crater);
glow(volX,volTopY+0.6,volZ,8,lavaGlow);
// 山肌を流れ落ちる溶岩
const fallCurve=new THREE.CatmullRomCurve3([new THREE.Vector3(volX,volTopY-0.5,volZ),new THREE.Vector3(volX-2.5,volBaseY+volH*0.5,volZ+2.5),new THREE.Vector3(14.5,hAt(14.5,-18)+0.3,-18)],false,'catmullrom',0.3);
scene.add(new THREE.Mesh(curveRibbon(fallCurve,1.1,0.0,50),lavaMat));
// 地表を流れる溶岩の川（道を横切る → 低い森へ）
const lavaCurve=new THREE.CatmullRomCurve3([new THREE.Vector3(14.5,0,-18),new THREE.Vector3(7,0,-15),new THREE.Vector3(0,0,-13),new THREE.Vector3(-8,0,-9),new THREE.Vector3(-15,0,-4)],false,'catmullrom',0.4);
const river=new THREE.Mesh(terrainRibbon(lavaCurve,1.9,0.14,220),lavaMat); scene.add(river);
const lavaBubbles=[];
for(let i=0;i<=24;i++){ const p=lavaCurve.getPoint(i/24); const bx=p.x+(Math.random()-.5)*1.7, bz=p.z+(Math.random()-.5)*1.7; const by=hAt(bx,bz);
  const b=new THREE.Mesh(new THREE.SphereGeometry(0.26+Math.random()*0.26,10,10),new THREE.MeshStandardMaterial({color:0xff7a22,emissive:0xff4808,emissiveIntensity:2.1})); b.position.set(bx,by+0.2,bz); scene.add(b); lavaBubbles.push({b,ph:Math.random()*6.28,by}); }
[[12,-17],[5,-14],[-4,-11],[-11,-6],[-15,-4]].forEach(p=>glow(p[0],hAt(p[0],p[1])+0.6,p[1],5,lavaGlow));
label('マグマ：経営者の無関心','これが最大の災害。組織を焼き、流し去る','red',volX-2,volTopY+2.2,volZ);
// 低い森を燃やす
const flames=[];
function burnTree(x,z){ const y=hAt(x,z); const g=new THREE.Group();
  const tr=new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.18,1.0,6),new THREE.MeshStandardMaterial({color:0x190d07})); tr.position.y=0.5; g.add(tr);
  for(let k=0;k<3;k++){ const fo=new THREE.Mesh(new THREE.ConeGeometry(0.62-k*0.16,1.0-k*0.18,7),new THREE.MeshStandardMaterial({color:0x2a150a,emissive:0xff3a08,emissiveIntensity:.6,flatShading:true})); fo.position.y=1.0+k*0.6; g.add(fo); }
  g.position.set(x,y,z); scene.add(g); flames.push(glow(x,y+1.5,z,2.4,flameTex)); }
for(let i=0;i<8;i++){ const a=Math.random()*6.28, rr=Math.random()*3.6; burnTree(-15+Math.cos(a)*rr,-4+Math.sin(a)*rr); }
glow(-15,hAt(-15,-4)+1.6,-4,7,lavaGlow);
label('育つはずの人材が燃える','大きく育とうとする才能（木々）を、無関心が焼く','red',-15,hAt(-15,-4)+3.2,-4);

// ===== ゴール：絶壁の上の天空の城 =====
const cbX=0, cbZ=-22, cbY=hAt(cbX,cbZ);
const cliff=new THREE.Mesh(new THREE.CylinderGeometry(3.2,6.4,15,10,1),new THREE.MeshStandardMaterial({color:0x4a4250,roughness:1,flatShading:true}));
cliff.position.set(cbX, cbY+6.5, cbZ); jitter(cliff.geometry,0.7); scene.add(cliff);
const cTop=cbY+14;
const castle=new THREE.Group(); castle.position.set(cbX,cTop,cbZ); scene.add(castle);
const keep=new THREE.Mesh(new THREE.BoxGeometry(2.2,2.4,2.2),new THREE.MeshStandardMaterial({color:0xb9c4d2,roughness:.6})); keep.position.y=1.2; castle.add(keep);
const roof=new THREE.Mesh(new THREE.ConeGeometry(1.9,1.6,4),new THREE.MeshStandardMaterial({color:0x8a3b3b})); roof.position.y=3.2; roof.rotation.y=Math.PI/4; castle.add(roof);
[[-1.6,-1.6],[1.6,-1.6],[-1.6,1.6],[1.6,1.6]].forEach(p=>{ const tw=new THREE.Mesh(new THREE.CylinderGeometry(0.55,0.65,2.8,12),new THREE.MeshStandardMaterial({color:0xc7d1de})); tw.position.set(p[0],1.1,p[1]); castle.add(tw);
  const rf=new THREE.Mesh(new THREE.ConeGeometry(0.78,1.2,12),new THREE.MeshStandardMaterial({color:0x9b4242})); rf.position.set(p[0],3.1,p[1]); castle.add(rf); });
const crown=new THREE.Mesh(new THREE.CylinderGeometry(0.6,0.5,0.55,12),new THREE.MeshStandardMaterial({color:0xffd45a,emissive:0x8a5e12,emissiveIntensity:1.3,metalness:.95,roughness:.12})); crown.position.y=4.0; castle.add(crown);
glow(cbX,cTop+4,cbZ,7.5); label('成功（天空の城）','橋を渡り、険しい崖を登った先','amber',cbX,cTop+6,cbZ);

// ===== 道：カーペット状の平リボン（地形に沿い、少し浮かせて埋もれ防止）。崖は道なし =====
const roadMat=new THREE.MeshStandardMaterial({color:0xe7c266,emissive:0xb8860b,emissiveIntensity:.4,metalness:.2,roughness:.6,side:THREE.DoubleSide});
const GWP=[[0,22],[-7,14],[6,8],[-5,2],[7,-4],[-3,-9],[0,-11]];  // start→①〜⑤→橋の手前
const groundCurve=new THREE.CatmullRomCurve3(GWP.map(p=>new THREE.Vector3(p[0],0,p[1])),false,'catmullrom',0.3);
scene.add(new THREE.Mesh(terrainRibbon(groundCurve,0.9,0.35,520), roadMat));

// 道なき崖を矢印が昇る：崖の前面に沿ったジグザグの登路（リボンは敷かない）
const coneBaseY=cbY-1, coneTopY=cbY+14, rBot=6.4, rTop=3.2;
function frontZ(x,y){ const f=Math.max(0,Math.min(1,(y-coneBaseY)/(coneTopY-coneBaseY))); const r=rBot+(rTop-rBot)*f; return cbZ+Math.sqrt(Math.max(0.4,r*r-x*x)); }
const _cy=[coneBaseY+1.5,coneBaseY+5,coneBaseY+8,coneBaseY+11,coneTopY-0.8];
const _cx=[-2.6,2.6,-2.4,1.9,0];
const climbCurve=new THREE.CatmullRomCurve3(_cy.map((y,i)=>new THREE.Vector3(_cx[i],y,frontZ(_cx[i],y)+0.7)),false,'catmullrom',0.2);

// 矢印（地表＝持ち上げて埋もれ防止／崖＝崖面の前を昇る）
const _up=new THREE.Vector3(0,1,0); const arrows=[];
function addArrows(curve, n, onTerrain){ for(let i=0;i<n;i++){ const a=new THREE.Mesh(new THREE.ConeGeometry(0.3,0.95,4),new THREE.MeshStandardMaterial({color:0xfff0b0,emissive:0xffd24a,emissiveIntensity:1.2,roughness:.3})); scene.add(a); arrows.push({m:a,curve,n,i,onTerrain}); } }
addArrows(groundCurve,14,true); addArrows(climbCurve,7,false);
function animArrows(t){ for(const o of arrows){ const u=((t*0.04)+o.i/o.n)%1; const p=o.curve.getPointAt(u), tan=o.curve.getTangentAt(u).normalize();
  const y=o.onTerrain?hAt(p.x,p.z)+0.6:p.y+0.25; o.m.position.set(p.x,y,p.z); o.m.quaternion.setFromUnitVectors(_up,tan); } }

// ===== 関門①〜⑤（地表の鳥居）＋⑥（マグマに架ける橋）=====
const WP=[
 {x:0,  z:22, n:'現在地（スタート）', s:'まだ何も始めていない自社', cls:'cyan', gate:false},
 {x:-7, z:14, n:'関門① 最初の1人', s:'ファーストペンギン（経営者ならベスト）', cls:'ok'},
 {x:6,  z:8,  n:'関門② 痛みを探す', s:'使うことを目的にせず現場のペインへ', cls:'ok'},
 {x:-5, z:2,  n:'関門③ 適材適所', s:'作る人／使う人／知らず触れる人', cls:'ok'},
 {x:7,  z:-4, n:'関門④ 情報を俯瞰', s:'全部覚えず“自社のカテゴリ”を見極める', cls:'ok'},
 {x:-3, z:-9, n:'関門⑤ 小さな成功＋風土', s:'反対派より一つの成果と改革の空気', cls:'ok'},
];
WP.forEach(w=>{ const y=hAt(w.x,w.z); const col=w.cls==='cyan'?0x5cc2ff:0x4fe0a6;
  const post=new THREE.Mesh(new THREE.CylinderGeometry(0.08,0.08,1.3,6),new THREE.MeshStandardMaterial({color:0x7a5a36})); post.position.set(w.x,y+0.65,w.z); scene.add(post);
  const orb=new THREE.Mesh(new THREE.SphereGeometry(0.26,16,16),new THREE.MeshStandardMaterial({color:col,emissive:col,emissiveIntensity:1.1})); orb.position.set(w.x,y+1.45,w.z); scene.add(orb);
  glow(w.x,y+1.45,w.z,2.3);
  if(w.gate!==false){ const pm=new THREE.MeshStandardMaterial({color:col,emissive:col,emissiveIntensity:.5,metalness:.3,roughness:.4});
    [-1.1,1.1].forEach(dx=>{ const pl=new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.12,2.6,8),pm); pl.position.set(w.x+dx,y+1.3,w.z); scene.add(pl); });
    const bar=new THREE.Mesh(new THREE.BoxGeometry(2.7,0.22,0.22),pm); bar.position.set(w.x,y+2.5,w.z); scene.add(bar); }
  label(w.n,w.s,w.cls,w.x,y+(w.gate!==false?3.2:2.0),w.z);
});
// 関門⑥＝マグマの川に架ける橋
const bridgeY=hAt(0,-13)+1.0;
const plank=new THREE.Mesh(new THREE.BoxGeometry(2.4,0.22,5.2),new THREE.MeshStandardMaterial({color:0x8a6a3e,roughness:.8})); plank.position.set(0,bridgeY,-13); scene.add(plank);
for(let i=0;i<4;i++){ const rail=new THREE.Mesh(new THREE.CylinderGeometry(0.06,0.06,1.0,6),new THREE.MeshStandardMaterial({color:0x6b4f30})); rail.position.set(i<2?-1.1:1.1, bridgeY+0.5, -15.2+(i%2)*4.4); scene.add(rail); }
const amber=new THREE.MeshStandardMaterial({color:0xffd166,emissive:0xffd166,emissiveIntensity:.5,metalness:.3,roughness:.4});
[-1.25,1.25].forEach(dx=>{ const pl=new THREE.Mesh(new THREE.CylinderGeometry(0.13,0.13,2.8,8),amber); pl.position.set(dx,bridgeY+1.3,-13); scene.add(pl); });
const top=new THREE.Mesh(new THREE.BoxGeometry(2.9,0.24,0.24),amber); top.position.set(0,bridgeY+2.6,-13); scene.add(top);
glow(0,bridgeY+1.2,-13,2.6);
label('関門⑥ 最後の壁＝土台','アーキテクチャ（全体の構造）という橋。崖が険しいほど、これが効いてくる','amber',0,bridgeY+3.3,-13);

// ===== 失敗の罠（地形に沿わせて埋まり解消）=====
const swampList=[];
function bigSwamp(x,z,r,name,sub){ const y=hAt(x,z);
  const pool=new THREE.Mesh(terrainDisc(x,z,r,48,0.1),new THREE.MeshStandardMaterial({color:0x4a2d63,emissive:0x6a2f8a,emissiveIntensity:.55,roughness:.35,metalness:.3,side:THREE.DoubleSide})); scene.add(pool);
  const bub=[]; for(let i=0;i<14;i++){ const a=Math.random()*6.28, rr=Math.random()*r*0.82; const bx=x+Math.cos(a)*rr, bz=z+Math.sin(a)*rr; const b=new THREE.Mesh(new THREE.SphereGeometry(0.22+Math.random()*0.2,10,10),new THREE.MeshStandardMaterial({color:0x9b59b6,emissive:0x7a2f9a,emissiveIntensity:.8,transparent:true,opacity:.85}));
    b.position.set(bx,hAt(bx,bz)+0.3,bz); scene.add(b); bub.push({b,ph:Math.random()*6.28,by:hAt(bx,bz)}); }
  swampList.push({bubbles:bub}); label(name,sub,'red',x,y+2.0,z); }
function pitfall(x,z,name,sub){ const y=hAt(x,z); const r=2.3;
  const hole=new THREE.Mesh(terrainDisc(x,z,r,28,0.04),new THREE.MeshBasicMaterial({color:0x05070c,side:THREE.DoubleSide})); scene.add(hole);
  const rim=new THREE.Mesh(terrainDisc(x,z,r,28,0.12),new THREE.MeshBasicMaterial({color:0x000000,wireframe:false,transparent:true,opacity:0})); // placeholder unused
  for(let k=0;k<8;k++){ const a=k/8*6.28; const ex=x+Math.cos(a)*r, ez=z+Math.sin(a)*r; const st=new THREE.Mesh(new THREE.BoxGeometry(0.18,0.4,0.18),new THREE.MeshStandardMaterial({color:0x6a5a44,roughness:1})); st.position.set(ex,hAt(ex,ez)+0.2,ez); scene.add(st); }
  for(let k=0;k<5;k++){ const a=k/5*6.28; const sp=new THREE.Mesh(new THREE.ConeGeometry(0.14,0.7,5),new THREE.MeshStandardMaterial({color:0xcfd6de,roughness:.6})); sp.position.set(x+Math.cos(a)*r*0.45,y-0.35,z+Math.sin(a)*r*0.45); scene.add(sp); }
  label(name,sub,'red',x,y+1.5,z); }
function darkForest(x,z,name,sub){ const y=hAt(x,z);
  for(let i=0;i<14;i++){ const a=Math.random()*6.28, rr=Math.random()*3.2; tree(x+Math.cos(a)*rr,z+Math.sin(a)*rr,1.0+Math.random()*0.7,true); }
  glow(x,y+1.6,z,6, glowTex([[0,'rgba(150,60,200,0.5)'],[0.5,'rgba(90,30,140,0.25)'],[1,'rgba(60,20,100,0)']]));
  label(name,sub,'red',x,y+3.4,z); }
bigSwamp(12,16,5.0,'毒沼：全員に丸投げ／個人に丸投げ','手前で広く沈む。使い道なく属人化');
pitfall(-11,9,'落とし穴：旗を振る人がいない','ファーストペンギン不在で踏み抜く');
darkForest(13,-1,'闇の魔の森：反対派に飲まれる','全員説得しようとして迷い込む');

// 花火
const fwTex=[glowTex([[0,'rgba(255,255,255,1)'],[0.3,'rgba(255,170,210,0.9)'],[1,'rgba(255,90,150,0)']]),
 glowTex([[0,'rgba(255,255,255,1)'],[0.3,'rgba(180,225,255,0.9)'],[1,'rgba(90,160,255,0)']]),
 glowTex([[0,'rgba(255,255,255,1)'],[0.3,'rgba(255,235,150,0.9)'],[1,'rgba(255,190,60,0)']])];
const bursts=[];
for(let b=0;b<4;b++){ const tex=fwTex[b%3]; const center=new THREE.Vector3(cbX+(Math.random()-.5)*9,cTop+7+Math.random()*4,cbZ+(Math.random()-.5)*8); const sp=[];
  for(let i=0;i<20;i++){ const s=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:0}));
    const th=Math.random()*6.28, ph=Math.acos(2*Math.random()-1), v=2.4+Math.random()*1.2;
    const dir=new THREE.Vector3(Math.sin(ph)*Math.cos(th),Math.cos(ph)*0.8,Math.sin(ph)*Math.sin(th)).multiplyScalar(v); s.scale.set(0.5,0.5,1); scene.add(s); sp.push({s,dir}); }
  bursts.push({center,phase:b/4,sparks:sp}); }
function animFireworks(t){ for(const b of bursts){ const u=((t*0.14)+b.phase)%1; const ex=u<0.6, life=u/0.6;
  for(const sp of b.sparks){ if(!ex){ sp.s.material.opacity=0; continue; } const r=life*3.6;
    sp.s.position.set(b.center.x+sp.dir.x*r,b.center.y+sp.dir.y*r-life*life*2,b.center.z+sp.dir.z*r);
    sp.s.material.opacity=Math.max(0,1-life)*0.95; const sc=0.5+life*0.6; sp.s.scale.set(sc,sc,1); } } }

controls.target.set(0,8,-8);
camera.position.set(3,30,52);
if(innerWidth<600){ camera.position.set(3,42,72); }

addEventListener('resize',()=>{ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight); labelRenderer.setSize(innerWidth,innerHeight); });

const loadingEl=document.getElementById('loading'); if(loadingEl) loadingEl.remove();
let t=0;
(function loop(){ requestAnimationFrame(loop); t+=0.012;
  animArrows(t); animFireworks(t);
  river.material.emissiveIntensity=1.7+Math.abs(Math.sin(t*2.4))*0.9;
  for(const o of lavaBubbles){ const k=Math.abs(Math.sin(t*2.2+o.ph)); o.b.position.y=o.by+0.1+k*0.55; const sc=0.7+k*0.6; o.b.scale.set(sc,sc,sc); o.b.material.emissiveIntensity=1.6+k*1.0; }
  for(let i=0;i<flames.length;i++){ const k=0.6+0.4*Math.abs(Math.sin(t*5+i)); flames[i].material.opacity=k; flames[i].scale.set(2.0+k,2.6+k,1); }
  for(const s of swampList){ for(const o of s.bubbles){ o.b.position.y=o.by+0.3+Math.abs(Math.sin(t*1.6+o.ph))*0.5; o.b.material.opacity=0.5+Math.abs(Math.sin(t*1.6+o.ph))*0.4; } }
  controls.update(); renderer.render(scene,camera); labelRenderer.render(scene,camera);
})();
</script>
