<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIで儲かる順番の航海図 ─ 4つの島（利益マップ）</title>
<style>
:root{ --ink:#eef4fb; --sub:#a8bccf; --cyan:#5cc2ff; --amber:#ffd166; --ok:#4fe0a6; --red:#ff7a7a; }
*{box-sizing:border-box} html,body{margin:0;height:100%;overflow:hidden;background:#0a1626;
  font-family:"Segoe UI","Hiragino Kaku Gothic ProN","Yu Gothic UI",Meiryo,sans-serif;color:var(--ink)}
#app{position:fixed;inset:0}
.lbl{font-size:26px;font-weight:700;padding:6px 13px;border-radius:11px;white-space:nowrap;
  background:rgba(7,14,26,.74);border:1px solid #2e4258;box-shadow:0 4px 16px rgba(0,0,0,.6);pointer-events:none;backdrop-filter:blur(2px)}
.lbl.cyan{color:var(--cyan);border-color:#2f6fa0} .lbl.amber{color:var(--amber);border-color:#84621f}
.lbl.ok{color:var(--ok);border-color:#246a52} .lbl.red{color:var(--red);border-color:#803434}
.lbl small{display:block;color:var(--sub);font-weight:400;font-size:20px;margin-top:2px;white-space:nowrap}
#title{position:fixed;left:18px;top:14px;max-width:62%;z-index:5;text-shadow:0 2px 8px rgba(0,0,0,.7)}
#title h1{font-size:2.1rem;margin:0 0 5px} #title p{margin:0;color:var(--sub);font-size:1.4rem;line-height:1.55}
#legend{position:fixed;right:14px;top:14px;z-index:5;background:rgba(8,16,28,.82);border:1px solid #2e4258;
  border-radius:12px;padding:13px 16px;font-size:1.45rem;line-height:1.6;max-width:480px}
#legend b{color:var(--ink)} .dot{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:6px;vertical-align:middle}
#legend hr{border:none;border-top:1px solid #2e4258;margin:7px 0}
#tip{position:fixed;z-index:8;display:none;max-width:360px;color:#eef4fb;font-size:1.2rem;line-height:1.5;
  background:rgba(7,14,26,.93);border:1px solid #3a5575;border-radius:10px;padding:11px 14px;
  box-shadow:0 6px 22px rgba(0,0,0,.6);pointer-events:none;backdrop-filter:blur(2px)}
.btns{position:fixed;right:14px;bottom:12px;z-index:5;display:flex;gap:7px;flex-wrap:wrap;justify-content:flex-end;max-width:50%}
.btns button{background:#11202f;color:var(--ink);border:1px solid #2e4258;border-radius:9px;padding:11px 16px;
  font-size:1.5rem;cursor:pointer;font-family:inherit} .btns button:hover{border-color:var(--cyan)}
#compass{position:fixed;right:16px;bottom:84px;z-index:6;width:88px;text-align:center;pointer-events:none}
#compass svg{display:block;width:88px;height:88px;filter:drop-shadow(0 3px 10px rgba(0,0,0,.55))}
#compass .cap{margin-top:2px;font-size:1.25rem;font-weight:700;color:#ffd166;text-shadow:0 2px 6px rgba(0,0,0,.85)}
#loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;color:#8fb4d6;font-size:.9rem;z-index:9}
@media (max-width:600px){
  /* スマホは画面を覆わないよう、表題h1・コンパス・下部ボタンだけ残し、副題/凡例/島ラベルは隠す */
  #title{left:10px;top:8px;max-width:72%} #title h1{font-size:1.45rem} #title .desc{display:none} #title .ops{font-size:.78rem;margin-top:2px;opacity:.9}
  #legend{display:none}
  .lbl{font-size:14px;padding:3px 8px} .lbl small{display:none}
  #tip{font-size:1.05rem;max-width:80vw}
  .btns{left:10px;right:10px;max-width:none;bottom:8px;justify-content:center} .btns button{padding:10px 13px;font-size:1.2rem}
  #compass{width:74px;top:6px;right:8px;bottom:auto}
  #compass svg{width:74px;height:74px} #compass .cap{font-size:.95rem}
}
</style>
</head>
<body>
<div id="app"></div>
<div id="loading">航海図を描いています･･･</div>

<div id="title">
  <h1>AIで儲かる順番の航海図</h1>
  <p class="desc">4つの島＝AI導入の4段。近い島ほど “確実・すぐ”、遠い島ほど “大きいが険しい”。</p>
  <p class="ops">指で回転／2本指で拡大（PCはドラッグ／ホイール）。</p>
</div>

<div id="legend">
  <div><span class="dot" style="background:#4fe0a6"></span><b>① 定型作業</b>：コスト削減・確実</div>
  <div><span class="dot" style="background:#ffd166"></span><b>② ナレッジDB</b>：直接の宝は無いが③④を磨くレバレッジ（灯台）</div>
  <div><span class="dot" style="background:#5cc2ff"></span><b>③ データ活用</b>：売上・攻め（“道具”から本格システム開発へ）</div>
  <div><span class="dot" style="background:#ff7a7a"></span><b>④ SaaS内製</b>：やる/やらずでなくトレードオフ（簡単なら内製も）</div>
  <hr>
  <div style="color:#a8bccf">島にカーソルを乗せる（スマホはタップ）と説明 ▶</div>
</div>

<div id="tip"></div>

<div class="btns">
  <button data-go="port">現在地</button>
  <button data-go="1">①</button>
  <button data-go="2">②</button>
  <button data-go="3">③</button>
  <button data-go="4">④</button>
  <button data-go="all">全体</button>
</div>

<div id="compass">
  <svg viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="46" fill="rgba(8,16,28,.82)" stroke="#2e4258" stroke-width="2.5"/>
    <circle cx="50" cy="50" r="39" fill="none" stroke="#243a52" stroke-width="1"/>
    <g id="cdial">
      <polygon points="50,8 59,50 50,40 41,50" fill="#ffd45a" stroke="#9c7a1c" stroke-width="1"/>
      <polygon points="50,92 56,52 50,60 44,52" fill="#5a7088"/>
      <circle cx="50" cy="12" r="3.4" fill="#fff3c0"/>
      <circle cx="50" cy="50" r="4" fill="#0a1626" stroke="#ffd166" stroke-width="1.5"/>
    </g>
  </svg>
  <div class="cap">目指す宝 ④</div>
</div>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

const app=document.getElementById('app');
const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x16344f, 0.012);
const camera=new THREE.PerspectiveCamera(48, innerWidth/innerHeight, 0.1, 600);

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight); renderer.setPixelRatio(Math.min(devicePixelRatio,1.75));
renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=1.28;
app.appendChild(renderer.domElement);
const labelRenderer=new CSS2DRenderer(); labelRenderer.setSize(innerWidth,innerHeight);
labelRenderer.domElement.style.position='fixed'; labelRenderer.domElement.style.top='0'; labelRenderer.domElement.style.pointerEvents='none';
app.appendChild(labelRenderer.domElement);
document.getElementById('loading').remove();

const controls=new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true; controls.maxPolarAngle=Math.PI*0.495; controls.minDistance=10; controls.maxDistance=90;

// ===== 空（グラデーション）＋ 夕暮れの光 =====
const sky=new THREE.Mesh(new THREE.SphereGeometry(300,32,16), new THREE.ShaderMaterial({side:THREE.BackSide,
  uniforms:{top:{value:new THREE.Color(0x0b1a30)}, mid:{value:new THREE.Color(0x244c6b)}, bot:{value:new THREE.Color(0xe8a24d)}},
  vertexShader:`varying vec3 vp; void main(){ vp=position; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
  fragmentShader:`varying vec3 vp; uniform vec3 top; uniform vec3 mid; uniform vec3 bot;
    void main(){ float h=normalize(vp).y; vec3 c = h>0.05 ? mix(mid,top,smoothstep(0.05,0.55,h)) : mix(bot,mid,smoothstep(-0.06,0.05,h)); gl_FragColor=vec4(c,1.0);} `}));
scene.add(sky);
scene.add(new THREE.HemisphereLight(0xbfe0ff, 0x1a3a55, 1.05));
const sun=new THREE.DirectionalLight(0xffd9a0, 1.55); sun.position.set(-30,16,-40); scene.add(sun);
const fill=new THREE.DirectionalLight(0x6fb6ff, 0.45); fill.position.set(20,10,18); scene.add(fill);
// 太陽は硬い円盤だと“2色割れ”に見えるので置かない。小さく遠い柔らかな光だけ
const sunGlow=new THREE.Sprite(new THREE.SpriteMaterial({map:glowTex([[0,'rgba(255,247,222,0.92)'],[0.25,'rgba(255,206,130,0.5)'],[0.6,'rgba(255,150,90,0.14)'],[1,'rgba(255,120,60,0)']]),blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,fog:false}));
sunGlow.position.set(-28,28,-130); sunGlow.scale.set(42,42,1); scene.add(sunGlow);

// ===== 海（うねる水面）=====
const SEG=56;
const waterGeo=new THREE.PlaneGeometry(360,360,SEG,SEG);
const waterMat=new THREE.MeshStandardMaterial({color:0x1e6594, metalness:0.4, roughness:0.14, flatShading:true});
const water=new THREE.Mesh(waterGeo, waterMat); water.rotation.x=-Math.PI/2; scene.add(water);
const wbase=waterGeo.attributes.position.array.slice();
function waveAt(x,y,t){ return Math.sin(x*0.05+t*0.55)*0.32 + Math.sin(y*0.07+t*0.45)*0.24 + Math.sin((x*0.5+y)*0.04+t*0.35)*0.30; }

// ===== 共通ヘルパ =====
const tl=new THREE.TextureLoader();
function glowTex(stops){ const c=document.createElement('canvas'); c.width=c.height=128; const g=c.getContext('2d');
  const gr=g.createRadialGradient(64,64,0,64,64,64); stops.forEach(s=>gr.addColorStop(s[0],s[1])); g.fillStyle=gr; g.fillRect(0,0,128,128);
  return new THREE.CanvasTexture(c); }
const goldGlow=glowTex([[0,'rgba(255,255,235,1)'],[0.25,'rgba(255,214,120,0.95)'],[1,'rgba(255,180,60,0)']]);
const sparkTex=glowTex([[0,'rgba(255,255,255,1)'],[0.4,'rgba(220,240,255,0.7)'],[1,'rgba(180,220,255,0)']]);
function glow(x,y,z,scale,tex=goldGlow){ const s=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true}));
  s.position.set(x,y,z); s.scale.set(scale,scale,1); scene.add(s); return s; }
const sparkles=[];
const treasure=[]; // 垂直軸でくるくる回転＆キラめく宝（①金貨／③金貨・ダイヤ）
function animTreasure(t){ for(const o of treasure){ o.m.rotation.y += o.spin*0.018;
  o.mat.emissiveIntensity = o.baseEI + Math.abs(Math.sin(t*3+o.ph))*o.amp;
  o.m.position.y = o.baseY + Math.sin(t*1.6+o.ph)*0.05; } }
// ダイヤモンドカット風の宝石（細いテーブル→広いガードル→下に尖るパビリオン。8面ファセットで輝く）
function diamond(sz,col){ const g=new THREE.Group();
  const mat=new THREE.MeshStandardMaterial({color:col,emissive:col,emissiveIntensity:1.0,metalness:.4,roughness:.05,flatShading:true});
  const crown=new THREE.Mesh(new THREE.CylinderGeometry(sz*0.5,sz,sz*0.45,8),mat); crown.position.y=sz*0.225; g.add(crown);
  const pav=new THREE.Mesh(new THREE.ConeGeometry(sz,sz*1.2,8),mat); pav.rotation.x=Math.PI; pav.position.y=-sz*0.6; g.add(pav);
  return {group:g,mat}; }
function sparkleField(cx,cy,cz,n,r){ for(let i=0;i<n;i++){ const s=new THREE.Sprite(new THREE.SpriteMaterial({map:sparkTex,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true}));
  const a=Math.random()*Math.PI*2, rr=r*(0.4+Math.random()*0.6);
  s.position.set(cx+Math.cos(a)*rr, cy+Math.random()*r*0.9, cz+Math.sin(a)*rr); const sc=0.25+Math.random()*0.4; s.scale.set(sc,sc,1);
  s.userData={ph:Math.random()*6.28, sp:1.5+Math.random()*2}; scene.add(s); sparkles.push(s);} }

const clickable=[]; const groups={};
function label(text,sub,cls,x,y,z){ const d=document.createElement('div'); d.className='lbl '+(cls||'');
  d.innerHTML=text+(sub?`<small>${sub}</small>`:''); const o=new CSS2DObject(d); o.position.set(x,y,z); scene.add(o); return o; }

// 有機的な島（岩＋砂浜＋緑＋木）
function island(g,r,opt={}){
  const rock=new THREE.Mesh(new THREE.ConeGeometry(r*1.05, 1.8, 9, 1),
    new THREE.MeshStandardMaterial({color:opt.rock||0x6b5a44, roughness:1, flatShading:true}));
  rock.position.y=0.5; jitter(rock.geometry,0.22); g.add(rock);
  const sand=new THREE.Mesh(new THREE.CylinderGeometry(r*1.18,r*1.32,0.5,11),
    new THREE.MeshStandardMaterial({color:0xcaa86a, roughness:1})); sand.position.y=0.1; g.add(sand);
  if(opt.grass!==false){ const grass=new THREE.Mesh(new THREE.SphereGeometry(r*0.92,12,8,0,Math.PI*2,0,Math.PI*0.5),
    new THREE.MeshStandardMaterial({color:0x3f7d4a, roughness:.95, flatShading:true})); grass.position.y=0.95; jitter(grass.geometry,0.16); g.add(grass);
    const tn=opt.trees||3; for(let i=0;i<tn;i++){ const a=Math.random()*6.28, rr=r*(0.3+Math.random()*0.5);
      const tr=new THREE.Mesh(new THREE.CylinderGeometry(0.07,0.1,0.6,6),new THREE.MeshStandardMaterial({color:0x5a4326}));
      tr.position.set(Math.cos(a)*rr,1.5,Math.sin(a)*rr); g.add(tr);
      const fo=new THREE.Mesh(new THREE.ConeGeometry(0.45,1.0,7),new THREE.MeshStandardMaterial({color:0x2f6e3f,flatShading:true}));
      fo.position.set(Math.cos(a)*rr,2.2,Math.sin(a)*rr); g.add(fo);} }
  // 波打ち際の白い泡リング
  const foam=new THREE.Mesh(new THREE.RingGeometry(r*1.3,r*1.6,28), new THREE.MeshBasicMaterial({color:0xbfe6ff,transparent:true,opacity:.32,side:THREE.DoubleSide}));
  foam.rotation.x=-Math.PI/2; foam.position.y=0.06; g.add(foam); g.userData.foam=foam;
}
function jitter(geo,amp){ const p=geo.attributes.position; for(let i=0;i<p.count;i++){ if(p.getY(i)>0.05) p.setXYZ(i,p.getX(i)+(Math.random()-.5)*amp,p.getY(i),p.getZ(i)+(Math.random()-.5)*amp);} p.needsUpdate=true; geo.computeVertexNormals(); }

// ===== 4つの島（左右ジグザグ・奥へ）=====
const ISL=[
 {key:'port',x:0,z:20,r:1.6,label:'現在地（大陸の港町）',cls:'cyan',info:'あなたの会社が、今いる本土の港町。ここから船を出し、“近い島＝確実な利益” へ、まず漕ぎ出す。'},
 {key:'1',x:-11,z:11,r:2.4,label:'① 定型作業の自動化',sub:'コスト削減・すぐ・確実 ／ KPI: 削減人時 × 時給',cls:'ok',
   info:'転記・計算・文章など “誰がやっても一意” の繰り返し。港のすぐ前＝確実で即効。唯一すぐ円で測れる。まずここから。'},
 {key:'2',x:12,z:2,r:2.2,label:'② ナレッジDB（記事9）',sub:'直接の宝は無い → ③④を磨くレバレッジ（灯台）',cls:'amber',
   info:'散らばる情報を一つの体系に。② 自体に宝（直接の利益）は無い。でも、ここで整えたデータが ③④ の宝を何倍にも大きく磨き上げる “レバレッジ（てこ）の源”。灯台のように航路を照らしつつ、未来の宝を研ぐ砥石。利益で測らず投資と捉える。'},
 {key:'3',x:-13,z:-8,r:2.4,label:'③ 眠るデータの活用',sub:'売上・攻め ／ ここから “本格システム開発”',cls:'cyan',
   info:'集めただけのデータを、未来の戦略へ。守りから攻めへ。売上やPOSがあれば過去の可視化も未来予測もできる。外注なら高額で手が出せなかった分析を “自前” にできること自体が成果＝金額インパクト大。ここが分岐点 ―― ①②の “1枚で動く道具” を超え、複数データをつなぐ “本格的なシステム開発” に入る。KPIは受注率・解約率・客単価。'},
 {key:'4',x:15,z:-19,r:2.4,label:'④ SaaS内製化',sub:'やる/やらずでなくトレードオフ（簡単なら内製も）',cls:'red',
   info:'いちばん大きな宝は断崖の上の天空の城。自前化はコスト削減も大きいが、作る＋保守＋責任を全部背負う。やる/やらないでなくトレードオフ ―― 社内で完結する簡単なものなら内製の可能性あり。複雑なもの・外部サービス接続・セキュリティ上むずかしいものは無理しない。「月額」対「作る＋保守＋責任」で見極める。'},
];

ISL.forEach(d=>{
  const g=new THREE.Group(); g.position.set(d.x,0,d.z); scene.add(g); groups[d.key]=g;
  g.userData={info:d.info,key:d.key};

  if(d.key==='port'){
    // ===== 本土（大陸）：渚に港町、奥に森と山。画面下部に帯状に見せる =====
    const land=new THREE.Mesh(new THREE.BoxGeometry(74,3.4,26),new THREE.MeshStandardMaterial({color:0x3c6b3b,roughness:.97,flatShading:true})); land.position.set(0,-0.2,14); g.add(land);
    const cliff=new THREE.Mesh(new THREE.BoxGeometry(74,3.0,2.4),new THREE.MeshStandardMaterial({color:0x7a5a38,roughness:1,flatShading:true})); cliff.position.set(0,0.0,-0.6); g.add(cliff);
    const beach=new THREE.Mesh(new THREE.BoxGeometry(74,0.4,2.4),new THREE.MeshStandardMaterial({color:0xcaa86a})); beach.position.set(0,0.05,-1.9); g.add(beach);
    // 雪冠つきの山で“大陸”のスケールを出す
    [[-24,9,11],[-10,12,13],[9,8,10],[25,11,12]].forEach((m)=>{ const h=m[1];
      const mt=new THREE.Mesh(new THREE.ConeGeometry(h*0.6,h,7),new THREE.MeshStandardMaterial({color:0x596b50,roughness:1,flatShading:true})); mt.position.set(m[0],1.4+h/2,m[2]); jitter(mt.geometry,0.5); g.add(mt);
      const cap=new THREE.Mesh(new THREE.ConeGeometry(h*0.26,h*0.32,7),new THREE.MeshStandardMaterial({color:0xeef3f6,roughness:.9,flatShading:true})); cap.position.set(m[0],1.4+h-h*0.16,m[2]); g.add(cap); });
    // 森（針葉樹の群れ）
    for(let i=0;i<48;i++){ const fx=(Math.random()-.5)*70, fz=4+Math.random()*13, fh=0.9+Math.random()*1.4;
      const ft=new THREE.Mesh(new THREE.ConeGeometry(fh*0.42,fh,6),new THREE.MeshStandardMaterial({color:Math.random()<.5?0x2c5e34:0x244f2b,flatShading:true})); ft.position.set(fx,1.55+fh/2,fz); g.add(ft); }
    // 渚の港町（小さくまとめる）
    for(let i=0;i<5;i++){ const hx=(i-2)*2.7+(Math.random()-.5); const hz=2.5+Math.random()*3; const hh=0.8+Math.random()*0.6;
      const house=new THREE.Mesh(new THREE.BoxGeometry(1.3,hh,1.3),new THREE.MeshStandardMaterial({color:i%2?0xd9cbb0:0xc9b89a,roughness:.85})); house.position.set(hx,1.55+hh/2,hz); g.add(house);
      const roof=new THREE.Mesh(new THREE.ConeGeometry(1.05,0.85,4),new THREE.MeshStandardMaterial({color:i%2?0x9b4a3a:0x6a3f55})); roof.position.set(hx,1.55+hh+0.34,hz); roof.rotation.y=Math.PI/4; g.add(roof); }
    // 桟橋
    const dock=new THREE.Mesh(new THREE.BoxGeometry(1.8,0.22,5.4),new THREE.MeshStandardMaterial({color:0x6b4f30,roughness:.8})); dock.position.set(0,1.0,-3.8); g.add(dock);
    for(let i=0;i<5;i++){ const post=new THREE.Mesh(new THREE.CylinderGeometry(0.09,0.09,1.5,6),new THREE.MeshStandardMaterial({color:0x4a3724})); post.position.set(i%2?0.75:-0.75,0.4,-1.6-i*1.1); g.add(post); }
    // ===== 現在地＝桟橋に停泊する帆船 =====
    const boat=new THREE.Group(); boat.position.set(1.7,1.05,-5.6);
    const hull=new THREE.Mesh(new THREE.BoxGeometry(1.0,0.5,2.4),new THREE.MeshStandardMaterial({color:0x8a3b2a,roughness:.7})); boat.add(hull);
    const deck=new THREE.Mesh(new THREE.BoxGeometry(1.06,0.2,2.5),new THREE.MeshStandardMaterial({color:0xc9a24e,metalness:.5,roughness:.4})); deck.position.y=0.3; boat.add(deck);
    const mast=new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.05,2.4,6),new THREE.MeshStandardMaterial({color:0x5a4326})); mast.position.y=1.4; boat.add(mast);
    const sail=new THREE.Mesh(new THREE.PlaneGeometry(1.1,1.5),new THREE.MeshStandardMaterial({color:0xf3ede0,roughness:.9,side:THREE.DoubleSide})); sail.position.set(0,1.55,0); boat.add(sail);
    const flag=new THREE.Mesh(new THREE.PlaneGeometry(0.5,0.3),new THREE.MeshStandardMaterial({color:0x5cc2ff,emissive:0x2b86c0,emissiveIntensity:.5,side:THREE.DoubleSide})); flag.position.set(0.28,2.5,0); boat.add(flag);
    g.add(boat); g.userData.boat=boat;
    glow(d.x+1.7,2.2,d.z-5.6,2.2,sparkTex);
  }
  if(d.key==='1'){
    island(g,d.r,{rock:0x6f5d44,trees:4});
    // 輝くコインの山（面を立てて“垂直軸”でくるくる回転＆キラめき）
    for(let i=0;i<9;i++){ const a=Math.random()*6.28,rr=0.5*Math.random();
      const cg=new THREE.CylinderGeometry(0.38,0.38,0.13,18); cg.rotateX(Math.PI/2); // 面を立て、垂直軸まわりの回転が見えるように
      const c=new THREE.Mesh(cg,new THREE.MeshStandardMaterial({color:0xffd64a,emissive:0xb37b18,emissiveIntensity:1.35,metalness:.9,roughness:.14}));
      c.position.set(Math.cos(a)*rr,3.0+i*0.12,Math.sin(a)*rr); c.rotation.y=Math.random()*6.28; g.add(c);
      treasure.push({m:c,mat:c.material,spin:1.0+Math.random()*1.0,baseEI:1.35,ph:Math.random()*6.28,baseY:c.position.y,amp:0.4+Math.random()*0.4}); }
    glow(d.x,3.5,d.z,5.4); sparkleField(d.x,3.1,d.z,12,1.1);
    flag(g,2.0,0x4fe0a6);
  }
  if(d.key==='2'){
    island(g,d.r,{rock:0x5a6b58,trees:1});
    const tower=new THREE.Mesh(new THREE.CylinderGeometry(0.34,0.55,3.4,16),new THREE.MeshStandardMaterial({color:0xf0f3f8,roughness:.55}));
    tower.position.y=2.6; g.add(tower);
    // 赤白の帯
    [1.6,2.6,3.5].forEach(y=>{ const b=new THREE.Mesh(new THREE.CylinderGeometry(0.4,0.45,0.42,16),new THREE.MeshStandardMaterial({color:0xe44b4b}));
      b.position.y=y; g.add(b); });
    const cap=new THREE.Mesh(new THREE.ConeGeometry(0.62,0.8,14),new THREE.MeshStandardMaterial({color:0x3a4a5e})); cap.position.y=4.6; g.add(cap);
    const lamp=new THREE.Mesh(new THREE.SphereGeometry(0.3,16,16),new THREE.MeshStandardMaterial({color:0xfff4c0,emissive:0xffd166,emissiveIntensity:2.2}));
    lamp.position.y=4.2; g.add(lamp); glow(d.x,4.2,d.z,2.6,goldGlow);
    // 回転する灯台のビーム（灯台の頭から出る）
    const beamGrp=new THREE.Group(); beamGrp.position.y=4.2; g.add(beamGrp);
    const beam=new THREE.Mesh(new THREE.ConeGeometry(2.0,16,24,1,true),
      new THREE.MeshBasicMaterial({color:0xffe9a8,transparent:true,opacity:0.12,side:THREE.DoubleSide,depthWrite:false,blending:THREE.AdditiveBlending}));
    beam.rotation.z=Math.PI/2; beam.position.x=8; beamGrp.add(beam); g.userData.beam=beamGrp;
  }
  if(d.key==='3'){
    island(g,d.r,{rock:0x6a5a44,trees:3});
    // リッチな開いた宝箱＋宝石
    const body=new THREE.Mesh(new THREE.BoxGeometry(1.8,1.0,1.2),new THREE.MeshStandardMaterial({color:0x6e4a26,roughness:.6}));
    body.position.y=2.9; g.add(body);
    const bands=new THREE.Mesh(new THREE.BoxGeometry(1.86,1.06,0.18),new THREE.MeshStandardMaterial({color:0xc9a64e,metalness:.8,roughness:.3}));
    bands.position.set(0,2.9,0); g.add(bands);
    const lid=new THREE.Mesh(new THREE.BoxGeometry(1.8,0.5,1.24),new THREE.MeshStandardMaterial({color:0x7d5630,roughness:.6}));
    lid.position.set(0,3.65,-0.6); lid.rotation.x=-1.0; g.add(lid);
    // あふれる金貨（面を立てて垂直軸で回転＆キラめき）
    for(let i=0;i<10;i++){ const cg=new THREE.CylinderGeometry(0.18,0.18,0.07,14); cg.rotateX(Math.PI/2);
      const c=new THREE.Mesh(cg,new THREE.MeshStandardMaterial({color:0xffd45a,emissive:0x7a5310,emissiveIntensity:1,metalness:.9,roughness:.15}));
      c.position.set((Math.random()-.5)*1.4,3.35+Math.random()*0.5,(Math.random()-.5)*0.9); c.rotation.y=Math.random()*6.28; g.add(c);
      treasure.push({m:c,mat:c.material,spin:0.7+Math.random()*0.7,baseEI:1.0,ph:Math.random()*6.28,baseY:c.position.y,amp:0.35+Math.random()*0.35}); }
    // 宝箱からあふれる“大きなダイヤ”（ゆっくり垂直軸で回転＆キラキラ）
    [0x5cc2ff,0xff7a7a,0x9b8cff,0x5fe0a6,0xffe066,0xff9ad1].forEach((col,i)=>{ const sz=0.3+Math.random()*0.16;
      const dm=diamond(sz,col); const a=i/6*6.28, rr=0.55+Math.random()*0.5;
      dm.group.position.set(Math.cos(a)*rr,3.7+Math.random()*0.4,Math.sin(a)*rr*0.7); dm.group.rotation.y=Math.random()*6.28; g.add(dm.group);
      treasure.push({m:dm.group,mat:dm.mat,spin:0.32+Math.random()*0.45,baseEI:1.0,ph:Math.random()*6.28,baseY:dm.group.position.y,amp:0.6+Math.random()*0.5}); });
    glow(d.x,3.7,d.z,5.2); sparkleField(d.x,3.4,d.z,14,1.3);
    flag(g,2.0,0x5cc2ff);
  }
  if(d.key==='4'){
    // 断崖絶壁（高く険しい岩）
    const cliff=new THREE.Mesh(new THREE.CylinderGeometry(2.0,3.2,9,9,1),
      new THREE.MeshStandardMaterial({color:0x4a4250,roughness:1,flatShading:true})); cliff.position.y=4.5; jitter(cliff.geometry,0.4); g.add(cliff);
    const sand=new THREE.Mesh(new THREE.CylinderGeometry(3.2,3.7,0.5,11),new THREE.MeshStandardMaterial({color:0x6a5a52,roughness:1})); sand.position.y=0.2; g.add(sand);
    const foam=new THREE.Mesh(new THREE.RingGeometry(3.6,4.2,30),new THREE.MeshBasicMaterial({color:0xbfe6ff,transparent:true,opacity:.3,side:THREE.DoubleSide}));
    foam.rotation.x=-Math.PI/2; foam.position.y=0.06; g.add(foam); g.userData.foam=foam;
    // 天空の城（断崖の上）
    const castle=new THREE.Group(); castle.position.y=9.0; g.add(castle);
    const keep=new THREE.Mesh(new THREE.BoxGeometry(1.8,2.0,1.8),new THREE.MeshStandardMaterial({color:0xb9c4d2,roughness:.7})); keep.position.y=1.0; castle.add(keep);
    const keepRoof=new THREE.Mesh(new THREE.ConeGeometry(1.5,1.4,4),new THREE.MeshStandardMaterial({color:0x8a3b3b})); keepRoof.position.y=2.7; keepRoof.rotation.y=Math.PI/4; castle.add(keepRoof);
    [[-1.3,-1.3],[1.3,-1.3],[-1.3,1.3],[1.3,1.3]].forEach(p=>{ const tw=new THREE.Mesh(new THREE.CylinderGeometry(0.5,0.6,2.4,12),new THREE.MeshStandardMaterial({color:0xc7d1de}));
      tw.position.set(p[0],0.9,p[1]); castle.add(tw);
      const rf=new THREE.Mesh(new THREE.ConeGeometry(0.7,1.1,12),new THREE.MeshStandardMaterial({color:0x9b4242})); rf.position.set(p[0],2.6,p[1]); castle.add(rf); });
    // 最大の宝（王冠）＋強い輝き
    const crown=new THREE.Mesh(new THREE.CylinderGeometry(0.55,0.45,0.5,12),new THREE.MeshStandardMaterial({color:0xffd45a,emissive:0x8a5e12,emissiveIntensity:1.3,metalness:.95,roughness:.12})); crown.position.y=3.6; castle.add(crown);
    glow(d.x,12.6,d.z,5.2); sparkleField(d.x,11.5,d.z,14,1.6);
    // 花火は別途（城の上空）
  }

  const ly = d.key==='4'?15.6 : d.key==='port'?5.0 : (d.r+4.2);
  label(d.label,d.sub,d.cls,d.x,ly,d.z);
});

function flag(g,h,color){ const pole=new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.05,h,6),new THREE.MeshStandardMaterial({color:0xe6eefb}));
  pole.position.y=h/2+1.2; g.add(pole);
  const fl=new THREE.Mesh(new THREE.PlaneGeometry(0.8,0.46),new THREE.MeshStandardMaterial({color,emissive:color,emissiveIntensity:.35,side:THREE.DoubleSide}));
  fl.position.set(0.42,h+0.85,0); g.add(fl); }

// ===== 航路（島から島へ“流れる矢印”で動的に案内）=====
const pts=ISL.map(d=>new THREE.Vector3(d.x,0.7,d.z));
const curve=new THREE.CatmullRomCurve3(pts,false,'catmullrom',0.35);
// うっすら下地の航路ライン
const routeLine=new THREE.Line(new THREE.BufferGeometry().setFromPoints(curve.getPoints(140)),
  new THREE.LineDashedMaterial({color:0x8fd6ff,transparent:true,opacity:.22,dashSize:0.7,gapSize:0.7}));
routeLine.computeLineDistances(); scene.add(routeLine);
// 進行方向を向いて流れる矢印（コーン）
const ARN=12, arrows=[];
for(let i=0;i<ARN;i++){ const a=new THREE.Mesh(new THREE.ConeGeometry(0.34,1.05,4),
    new THREE.MeshStandardMaterial({color:0xfff0b0,emissive:0xffd24a,emissiveIntensity:1.15,metalness:.3,roughness:.3}));
  scene.add(a); arrows.push(a); }
const _up=new THREE.Vector3(0,1,0);
function animArrows(t){ for(let i=0;i<ARN;i++){ const u=((t*0.055)+i/ARN)%1;
    const p=curve.getPointAt(u), tan=curve.getTangentAt(u).normalize();
    arrows[i].position.set(p.x,0.95+Math.sin(t*2+i)*0.12,p.z);
    arrows[i].quaternion.setFromUnitVectors(_up,tan);
    arrows[i].scale.setScalar(0.7+Math.sin(u*Math.PI)*0.55); } }

// ===== 羅針盤は3D世界ではなく画面固定HUD（右下）に置く =====
label('まず ① から','近い島＝確実な宝','ok',-11,1.0,14.5);

// ===== インタラクション =====
const ray=new THREE.Raycaster(), m=new THREE.Vector2(); const tip=document.getElementById('tip');
function pickInfo(e){ m.x=(e.clientX/innerWidth)*2-1; m.y=-(e.clientY/innerHeight)*2+1; ray.setFromCamera(m,camera);
  const hit=ray.intersectObjects(Object.values(groups),true);
  if(hit.length){ let o=hit[0].object; while(o&&!(o.userData&&o.userData.info)) o=o.parent; if(o) return o.userData.info; }
  return null; }
function showTip(e){ const txt=pickInfo(e); if(!txt){ tip.style.display='none'; return; }
  tip.innerHTML=txt; tip.style.display='block';
  const pad=14, w=tip.offsetWidth, h=tip.offsetHeight;
  let x=e.clientX+16, y=e.clientY+16;
  if(x+w>innerWidth-pad) x=e.clientX-w-16;
  if(y+h>innerHeight-pad) y=innerHeight-h-pad;
  if(x<pad) x=pad; if(y<pad) y=pad;
  tip.style.left=x+'px'; tip.style.top=y+'px'; }
// PCはマウスオーバーで追従表示、スマホはタップで表示
renderer.domElement.addEventListener('pointermove',e=>{ if(e.pointerType!=='touch') showTip(e); });
renderer.domElement.addEventListener('pointerdown',showTip);
renderer.domElement.addEventListener('pointerleave',()=>{ tip.style.display='none'; });

function fly(target,cam){ controls.target.copy(target); camera.position.copy(cam); }
const V={ all:[new THREE.Vector3(0,4,-5),new THREE.Vector3(1,16,36)],
  allM:[new THREE.Vector3(0,4,-6),new THREE.Vector3(1,23,56)],
  port:[new THREE.Vector3(0,1,20),new THREE.Vector3(0,8,32)],
  '1':[new THREE.Vector3(-11,1.5,11),new THREE.Vector3(-11,8,22)],
  '2':[new THREE.Vector3(12,2.5,2),new THREE.Vector3(12,9,14)],
  '3':[new THREE.Vector3(-13,1.5,-8),new THREE.Vector3(-13,9,3)],
  '4':[new THREE.Vector3(15,9,-19),new THREE.Vector3(16,21,3)] };
document.querySelectorAll('.btns button').forEach(b=>b.onclick=()=>{ const mob=innerWidth<600; const v=(b.dataset.go==='all'&&mob)?V.allM:V[b.dataset.go]; if(v) fly(v[0],v[1]); });
{ const v=innerWidth<600?V.allM:V.all; fly(v[0],v[1]); }

addEventListener('resize',()=>{ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight); labelRenderer.setSize(innerWidth,innerHeight); });

// ===== ④城の上空に連発する花火 =====
const fwTex=[ glowTex([[0,'rgba(255,255,255,1)'],[0.3,'rgba(255,170,210,0.9)'],[1,'rgba(255,90,150,0)']]),
  glowTex([[0,'rgba(255,255,255,1)'],[0.3,'rgba(180,225,255,0.9)'],[1,'rgba(90,160,255,0)']]),
  glowTex([[0,'rgba(255,255,255,1)'],[0.3,'rgba(255,235,150,0.9)'],[1,'rgba(255,190,60,0)']]),
  glowTex([[0,'rgba(255,255,255,1)'],[0.3,'rgba(200,255,190,0.9)'],[1,'rgba(110,230,120,0)']]) ];
const bursts=[];
for(let b=0;b<6;b++){ const tex=fwTex[b%fwTex.length];
  const center=new THREE.Vector3(ISL[4].x+(Math.random()-.5)*11, 15+Math.random()*7, ISL[4].z+(Math.random()-.5)*11);
  const sparks=[];
  for(let i=0;i<26;i++){ const s=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:0}));
    const th=Math.random()*Math.PI*2, ph=Math.acos(2*Math.random()-1), sp=2.6+Math.random()*1.4;
    const dir=new THREE.Vector3(Math.sin(ph)*Math.cos(th),Math.cos(ph)*0.8,Math.sin(ph)*Math.sin(th)).multiplyScalar(sp);
    s.scale.set(0.5,0.5,1); scene.add(s); sparks.push({s,dir}); }
  bursts.push({center,phase:b/6,sparks}); }
function animFireworks(t){ for(const b of bursts){ const u=((t*0.16)+b.phase)%1; const exploding=u<0.62, life=u/0.62;
  for(const sp of b.sparks){ if(!exploding){ sp.s.material.opacity=0; continue; }
    const r=life*4.2; sp.s.position.set(b.center.x+sp.dir.x*r, b.center.y+sp.dir.y*r-life*life*2.2, b.center.z+sp.dir.z*r);
    sp.s.material.opacity=Math.max(0,1-life)*0.95; const sc=0.5+life*0.7; sp.s.scale.set(sc,sc,1); } } }

const cdial=document.getElementById('cdial');
const goalPos=groups['4'].position.clone(); goalPos.y=11; const _cs=new THREE.Vector3(), _v=new THREE.Vector3(); // ④天空の宝の位置
let t=0;
(function loop(){ requestAnimationFrame(loop); t+=0.012;
  // 海のうねり
  const p=waterGeo.attributes.position;
  for(let i=0;i<p.count;i++){ const x=wbase[i*3], y=wbase[i*3+1]; p.setZ(i, waveAt(x,y,t)); }
  p.needsUpdate=true;
  // 泡のゆらぎ
  for(const k in groups){ const f=groups[k].userData.foam; if(f) f.material.opacity=0.22+Math.sin(t*2+groups[k].position.x)*0.12; }
  // 現在地＝停泊する帆船の揺れ
  if(groups.port?.userData.boat){ const b=groups.port.userData.boat; b.position.y=1.05+Math.sin(t*1.4)*0.07; b.rotation.z=Math.sin(t*1.1)*0.05; b.rotation.x=Math.sin(t*0.9+1)*0.04; }
  // 灯台のビーム回転
  if(groups['2']?.userData.beam) groups['2'].userData.beam.rotation.y+=0.012;
  // 航路の矢印・城の花火
  animArrows(t); animFireworks(t); animTreasure(t);
  // きらめき
  sparkles.forEach(s=>{ const o=0.25+Math.abs(Math.sin(t*s.userData.sp+s.userData.ph))*0.85; s.material.opacity=o; });
  // HUD羅針盤：常に④（天空の宝）が“画面上で見える方向”を指す（アスペクト比・FOV・見下ろし角を投影で正確に補正）
  if(cdial){ _v.copy(goalPos).applyMatrix4(camera.matrixWorldInverse); _cs.copy(goalPos).project(camera);
    let rx=_cs.x, ry=_cs.y; if(_v.z>0){ rx=-rx; ry=-ry; } // ④が背面のときは反転
    cdial.setAttribute('transform', `rotate(${(Math.atan2(rx,ry)*180/Math.PI).toFixed(1)} 50 50)`); }
  controls.update(); renderer.render(scene,camera); labelRenderer.render(scene,camera);
})();
</script>
